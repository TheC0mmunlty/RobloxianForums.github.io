<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROBLOX Forums - 2014</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Tahoma", Arial, sans-serif;
      background: #c8c8c8;
      margin: 0;
      padding: 0;
      color: #000;
    }

    .header {
      background: #003399;
      color: #ffcc00;
      padding: 12px 0;
      text-align: center;
      border-bottom: 8px solid #ffcc00;
      font-size: 34px;
      font-weight: bold;
      text-shadow: 4px 4px 0 #000;
    }

    .nav {
      background: #002266;
      padding: 10px 0;
      text-align: center;
      border-bottom: 5px solid #ffcc00;
    }

    .nav a {
      color: #ffcc00;
      margin: 0 20px;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }

    .main-container {
      max-width: 1000px;
      margin: 20px auto;
      background: #eeeeee;
      border: 5px solid #003399;
      box-shadow: 6px 6px 0 #222;
    }

    .category-header {
      background: #003399;
      color: #ffcc00;
      padding: 14px 20px;
      font-size: 22px;
      font-weight: bold;
      border-bottom: 5px solid #ffcc00;
    }

    .auth-box, .new-thread-box {
      margin: 20px;
      padding: 18px;
      background: #f8f8f8;
      border: 4px solid #003399;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border: 3px solid #003399;
      font-family: Tahoma;
      font-size: 15px;
    }

    button {
      background: #003399;
      color: #ffcc00;
      border: 4px solid #ffcc00;
      padding: 10px 20px;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      margin: 5px 5px 5px 0;
    }

    button:hover { background: #ffcc00; color: #003399; }

    .thread {
      background: white;
      border: 3px solid #003399;
      margin: 15px 20px;
      padding: 16px;
      cursor: pointer;
    }

    .thread:hover { background: #ffffcc; }

    .thread-title { font-size: 18px; font-weight: bold; color: #003399; }
    .thread-meta { font-size: 13px; color: #555; margin-top: 6px; }

    /* Post & Reply styling */
    .post {
      background: white;
      border: 3px solid #003399;
      margin: 15px 20px;
      padding: 15px;
    }

    .avatar {
      width: 50px;
      height: 50px;
      background: #003399;
      color: #ffcc00;
      border: 3px solid #ffcc00;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 22px;
      float: left;
      margin-right: 15px;
      border-radius: 4px;
    }

    .logged-in { 
      float: right; 
      color: #ffcc00; 
      margin-top: 8px; 
      font-size: 14px; 
    }
  </style>
</head>
<body>

  <div class="header">ROBLOX OLD FORUMS - 2014</div>

  <div class="nav">
    <a onclick="showCategory('general')">General Discussion</a>
    <a onclick="showCategory('help')">Help & Support</a>
    <a onclick="showCategory('offtopic')">Off Topic</a>
    <a onclick="showCategory('suggestions')">Suggestions</a>
    <span class="logged-in">Logged in as: <strong id="username">Not logged in</strong></span>
  </div>

  <div class="main-container">
    <div class="category-header" id="current-category">General Discussion</div>

    <!-- Auth Box -->
    <div id="auth-box" class="auth-box">
      <h3>Sign Up or Login</h3>
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">
      <button onclick="signUp()">Sign Up</button>
      <button onclick="login()">Login</button>
      <button onclick="logout()" style="background:#666;border-color:#666">Logout</button>
    </div>

    <!-- New Thread Box -->
    <div id="new-thread-box" class="new-thread-box" style="display:none;">
      <h3>Create New Thread</h3>
      <input type="text" id="thread-title" placeholder="Thread Title (be specific!)">
      <textarea id="thread-content" rows="5" placeholder="Write your message here..."></textarea>
      <button onclick="createThread()">Post Thread</button>
    </div>

    <!-- Threads List -->
    <div id="threads-list"></div>

    <!-- Full Thread View with Replies -->
    <div id="thread-view" style="display:none;">
      <button onclick="backToList()" style="margin:15px 20px;">← Back to List</button>
      <div id="original-post" class="post"></div>
      <div id="replies-list"></div>

      <div class="new-thread-box" style="margin:20px;">
        <h3>Reply to this thread</h3>
        <textarea id="reply-content" rows="4" placeholder="Write your reply here..."></textarea>
        <button onclick="postReply()">Post Reply</button>
      </div>
    </div>
  </div>

  <script>
    // YOUR FIREBASE CONFIG (already added)
    const firebaseConfig = {
      apiKey: "AIzaSyANfmR8j_Z7mHmSO1GNXGnIGKTdBiU6uiU",
      authDomain: "testingforum-669a9.firebaseapp.com",
      databaseURL: "https://testingforum-669a9-default-rtdb.firebaseio.com",
      projectId: "testingforum-669a9",
      storageBucket: "testingforum-669a9.firebasestorage.app",
      messagingSenderId: "685025117821",
      appId: "1:685025117821:web:3fe96e8e7fc440eeded314"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    let currentCategory = 'general';
    let currentThreadId = null;

    // Safe Avatar (colored box with first letter - no NSFW possible)
    function getAvatarHtml(username) {
      const letter = (username || "?").charAt(0).toUpperCase();
      const colors = ['#003399', '#ff6600', '#00aa00', '#cc0000', '#9900cc', '#ff8800'];
      const color = colors[username.length % colors.length];
      return `<div class="avatar" style="background:${color}">${letter}</div>`;
    }

    // Update UI when user logs in/out
    function updateUI(user) {
      const loggedIn = !!user;
      document.getElementById("auth-box").style.display = loggedIn ? "none" : "block";
      document.getElementById("new-thread-box").style.display = loggedIn ? "block" : "none";
      
      document.getElementById("username").textContent = user 
        ? (user.displayName || user.email.split('@')[0]) 
        : "Not logged in";
    }

    function signUp() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      if (!email || !password) return alert("Please enter email and password");
      
      auth.createUserWithEmailAndPassword(email, password)
        .then(() => alert("Account created successfully! You are now logged in."))
        .catch(error => alert("Sign Up Error: " + error.message));
    }

    function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      if (!email || !password) return alert("Please enter email and password");
      
      auth.signInWithEmailAndPassword(email, password)
        .then(() => alert("Logged in successfully!"))
        .catch(error => alert("Login Error: " + error.message));
    }

    function logout() {
      auth.signOut().then(() => {
        alert("Logged out");
      });
    }

    // Switch between categories
    function showCategory(cat) {
      currentCategory = cat;
      const names = {
        general: "General Discussion",
        help: "Help & Support",
        offtopic: "Off Topic",
        suggestions: "Suggestions"
      };
      document.getElementById("current-category").textContent = names[cat] || "Forum";
      
      currentThreadId = null;
      document.getElementById("thread-view").style.display = "none";
      document.getElementById("threads-list").style.display = "block";
      loadThreads();
    }

    // Load threads for current category
    function loadThreads() {
      const threadsRef = database.ref(currentCategory + '/threads');
      threadsRef.on('value', (snapshot) => {
        const data = snapshot.val();
        let html = '';
        
        if (data) {
          Object.keys(data).reverse().forEach(key => {
            const t = data[key];
            html += `
              <div class="thread" onclick="openThread('${key}')">
                <div class="thread-title">${t.title}</div>
                <div class="thread-meta">
                  Posted by ${t.author} • ${new Date(t.timestamp).toLocaleString()}
                </div>
              </div>`;
          });
        } else {
          html = `<p style="padding:40px; text-align:center; color:#666;">No threads yet.<br>Be the first to post!</p>`;
        }
        
        document.getElementById("threads-list").innerHTML = html;
      });
    }

    // Open thread and show replies
    function openThread(threadId) {
      currentThreadId = threadId;
      document.getElementById("threads-list").style.display = "none";
      document.getElementById("thread-view").style.display = "block";

      database.ref(currentCategory + '/threads/' + threadId).once('value', (snap) => {
        const thread = snap.val();
        if (!thread) return;

        document.getElementById("original-post").innerHTML = `
          ${getAvatarHtml(thread.author)}
          <div style="margin-left:70px">
            <strong style="font-size:18px">${thread.title}</strong><br>
            <small>by ${thread.author} • ${new Date(thread.timestamp).toLocaleString()}</small><br><br>
            ${thread.content || 'No content'}
          </div>
        `;

        loadReplies(threadId);
      });
    }

    function loadReplies(threadId) {
      const repliesRef = database.ref(currentCategory + '/threads/' + threadId + '/replies');
      repliesRef.on('value', (snap) => {
        const replies = snap.val();
        let html = '';
        if (replies) {
          Object.keys(replies).forEach(key => {
            const r = replies[key];
            html += `
              <div class="post">
                ${getAvatarHtml(r.author)}
                <div style="margin-left:70px">
                  <strong>${r.author}</strong> • ${new Date(r.timestamp).toLocaleString()}<br><br>
                  ${r.content}
                </div>
              </div>`;
          });
        }
        document.getElementById("replies-list").innerHTML = html || '<p style="padding:20px;text-align:center;color:#666">No replies yet. Be the first to reply!</p>';
      });
    }

    function postReply() {
      const content = document.getElementById("reply-content").value.trim();
      if (!content) return alert("Please write a reply!");

      const user = auth.currentUser;
      if (!user) return alert("You must be logged in to reply!");

      database.ref(currentCategory + '/threads/' + currentThreadId + '/replies').push({
        content: content,
        author: user.displayName || user.email.split('@')[0],
        timestamp: Date.now()
