<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Robloxians Forum</title>
    <style>
        body { 
            font-family: Verdana, Arial; 
            margin: 0; 
            padding: 0;
            background-color: #000; /* Backup color */
            /* LINK APPLIED BELOW */
            background-image: url('https://wallpapercave.com/wp/wp9084955.jpg'); 
            background-attachment: fixed; 
            background-size: cover;
            background-position: center;
        }

        header { 
            background: rgba(0, 0, 0, 0.85); /* Semi-transparent black header */
            color: white; 
            padding: 12px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 2px solid #444; 
            backdrop-filter: blur(5px); /* Makes the header look modern */
        }

        .main-wrapper { 
            width: 950px; 
            margin: 50px auto; 
            background: #fff; 
            border: 1px solid #333; 
            min-height: 800px; 
            box-shadow: 0px 0px 30px rgba(0,0,0,0.7); 
            position: relative; 
            border-radius: 4px; /* Slightly rounded edges for the forum box */
        }

        #announcement-banner { background: #FF8C00; border-bottom: 2px solid #CC7000; padding: 12px; text-align: center; font-size: 14px; font-weight: bold; color: white; display: none; }
        .auth-card { width: 400px; margin: 100px auto; border: 1px solid #0055ff; background: #f0f5ff; padding: 20px; text-align: center; border-radius: 8px; }
        input, select, textarea { width: 90%; padding: 8px; margin: 5px 0; border: 1px solid #bbb; font-size: 12px; border-radius: 3px; }
        .forum-header { background: #ddd; border: 1px solid #bbb; padding: 10px; font-weight: bold; margin-top: 15px; font-size: 13px; color: #333; }
        .thread-row { border-bottom: 1px solid #eee; padding: 12px; font-size: 12px; display: flex; justify-content: space-between; background: #fff; }
        .btn { background: #eee; border: 1px solid #999; padding: 6px 12px; cursor: pointer; font-size: 11px; border-radius: 3px; }
        .btn:hover { background: #e0e0e0; }
        .hidden { display: none !important; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: white; z-index: 1000; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

<div id="loading-overlay">LOADING ASSETS...</div>
<div id="announcement-banner"></div>

<header>
    <div style="font-weight:bold; font-size: 22px; letter-spacing: -1px;">THE ROBLOXIANS FORUM</div>
    <div id="user-display" style="font-size: 11px; color: #aaa;">Guest</div>
</header>

<div class="main-wrapper">
    <div id="logged-out-view" class="hidden">
        <div class="auth-card">
            <h3 style="margin-top:0;">Welcome! Please Log In</h3>
            <input type="text" id="reg-username" placeholder="Username">
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-password" placeholder="Password">
            <select id="reg-gender"><option value="Boy">Boy</option><option value="Girl">Girl</option></select>
            <div style="margin-top: 15px;">
                <button class="btn" id="loginBtn">Login</button>
                <button class="btn" id="signupBtn">Sign Up</button>
            </div>
        </div>
    </div>

    <div id="logged-in-view" class="hidden">
        <div style="background: #f9f9f9; padding: 12px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center;">
            <span id="welcome-text" style="font-weight:bold; font-size: 13px;">Syncing...</span>
            <button class="btn" id="logoutBtn" style="color: #c00;">Logout</button>
        </div>

        <div style="padding: 20px;">
            <div class="forum-header">Public Square - Post Message</div>
            <div style="padding: 15px; border: 1px solid #bbb; border-top: none; background: #fff;">
                <textarea id="post-input" placeholder="What's happening in the community?" style="height: 60px;"></textarea>
                <button class="btn" id="submitPost" style="margin-top:8px; font-weight: bold; background: #FF8C00; color: white; border: none; padding: 8px 16px;">Post to Thread</button>
            </div>
            <div class="forum-header">Recent Discussions</div>
            <div id="thread-display" style="border: 1px solid #bbb; border-top: none;"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, push, onValue, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyANfmR8j_Z7mHmSO1GNXGnIGKTdBiU6uiU",
        authDomain: "testingforum-669a9.firebaseapp.com",
        databaseURL: "https://testingforum-669a9-default-rtdb.firebaseio.com",
        projectId: "testingforum-669a9",
        storageBucket: "testingforum-669a9.firebasestorage.app",
        messagingSenderId: "685025117821",
        appId: "1:685025117821:web:c3340c8d5475e33eded314"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUsername = null;

    onAuthStateChanged(auth, async (user) => {
        document.getElementById('loading-overlay').classList.add('hidden');
        if (user) {
            const snap = await get(child(ref(db), `users/${user.uid}`));
            if(snap.exists()) {
                currentUsername = snap.val().username;
                document.getElementById('welcome-text').innerText = "Logged in as: " + currentUsername;
                document.getElementById('user-display').innerText = user.email;
                document.getElementById('logged-in-view').classList.remove('hidden');
                loadPosts();
            }
        } else {
            document.getElementById('logged-out-view').classList.remove('hidden');
            document.getElementById('logged-in-view').classList.add('hidden');
        }
    });

    document.getElementById('signupBtn').onclick = async () => {
        const u = document.getElementById('reg-username').value;
        const e = document.getElementById('auth-email').value;
        const p = document.getElementById('auth-password').value;
        const g = document.getElementById('reg-gender').value;
        if(!u || !e || !p) return alert("Fill all fields");
        try {
            const res = await createUserWithEmailAndPassword(auth, e, p);
            await set(ref(db, 'users/' + res.user.uid), { username: u, gender: g, email: e });
            location.reload();
        } catch(err) { alert(err.message); }
    };

    document.getElementById('loginBtn').onclick = () => {
        signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-password').value);
    };

    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());

    document.getElementById('submitPost').onclick = async () => {
        if(!currentUsername) return;
        const msg = document.getElementById('post-input').value;
        if(!msg) return;
        await push(ref(db, 'threads'), {
            message: msg, author: currentUsername, uid: auth.currentUser.uid, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
        });
        document.getElementById('post-input').value = "";
    };

    function loadPosts() {
        onValue(ref(db, 'threads'), (s) => {
            const display = document.getElementById('thread-display');
            display.innerHTML = "";
            s.forEach((child) => {
                const p = child.val();
                display.insertAdjacentHTML('afterbegin', `
                    <div class="thread-row">
                        <div><b style="color:#0055ff;">${p.author}</b>: ${p.message}</div>
                        <div style="color:#999; font-size:10px;">${p.time}</div>
                    </div>`);
            });
        });
    }

    onValue(ref(db, 'site_settings/announcement'), (s) => {
        const b = document.getElementById('announcement-banner');
        if(s.exists() && s.val() !== "") {
            b.innerText = s.val(); b.style.display = "block";
        } else { b.style.display = "none"; }
    });
</script>
</body>
</html>
