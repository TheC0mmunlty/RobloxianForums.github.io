<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROBLOX Forums - 2014</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: "Tahoma", "Arial", sans-serif;
      background: #c8c8c8;
      color: #000;
      margin: 0;
      padding: 0;
    }

    .header {
      background: #003399;
      color: #ffcc00;
      padding: 12px 0;
      text-align: center;
      border-bottom: 8px solid #ffcc00;
      font-size: 34px;
      font-weight: bold;
      text-shadow: 4px 4px 0 #000;
      letter-spacing: 1px;
    }

    .nav {
      background: #002266;
      padding: 10px 0;
      text-align: center;
      border-bottom: 5px solid #ffcc00;
    }

    .nav a {
      color: #ffcc00;
      margin: 0 22px;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
    }

    .main-container {
      max-width: 980px;
      margin: 20px auto;
      background: #eeeeee;
      border: 5px solid #003399;
      box-shadow: 6px 6px 0 #222;
    }

    .category-header {
      background: #003399;
      color: #ffcc00;
      padding: 14px 20px;
      font-size: 22px;
      font-weight: bold;
      border-bottom: 5px solid #ffcc00;
    }

    .auth-box, .new-thread-box {
      margin: 20px;
      padding: 18px;
      background: #f8f8f8;
      border: 4px solid #003399;
    }

    h3 { margin: 0 0 15px 0; color: #003399; }

    input[type="text"], input[type="email"], input[type="password"], textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border: 3px solid #003399;
      font-family: Tahoma;
      font-size: 15px;
    }

    button {
      background: #003399;
      color: #ffcc00;
      border: 4px solid #ffcc00;
      padding: 12px 28px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      margin-right: 10px;
    }

    button:hover {
      background: #ffcc00;
      color: #003399;
    }

    .threads-container {
      margin: 0 20px 25px 20px;
    }

    .thread {
      background: white;
      border: 3px solid #003399;
      margin-bottom: 15px;
      padding: 16px;
      cursor: pointer;
    }

    .thread:hover {
      background: #ffffcc;
      border-color: #ffcc00;
    }

    .thread-title {
      font-size: 18px;
      font-weight: bold;
      color: #003399;
      margin-bottom: 6px;
    }

    .thread-meta {
      font-size: 13px;
      color: #555;
    }

    .logged-in {
      float: right;
      margin-top: 8px;
      color: #ffcc00;
      font-size: 14px;
    }

    .auth-section {
      display: none;
    }
  </style>
</head>
<body>

  <div class="header">
    ROBLOX OLD FORUMS - 2014
  </div>

  <div class="nav">
    <a href="#">General Discussion</a>
    <a href="#">Help & Support</a>
    <a href="#">Off Topic</a>
    <a href="#">Suggestions</a>
    <span class="logged-in">Logged in as: <strong id="username">Not logged in</strong></span>
  </div>

  <div class="main-container">
    <div class="category-header">General Discussion</div>

    <!-- Auth Box (shows when not logged in) -->
    <div id="auth-box" class="auth-box">
      <h3>Sign Up or Login</h3>
      
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">
      
      <button onclick="signUp()">Sign Up</button>
      <button onclick="login()">Login</button>
      <button onclick="logout()" style="background:#666; border-color:#666;">Logout</button>
    </div>

    <!-- New Thread Box (only shows when logged in) -->
    <div id="new-thread-box" class="new-thread-box" style="display: none;">
      <h3>Create New Thread</h3>
      <input type="text" id="thread-title" placeholder="Thread Title (be specific!)">
      <textarea id="thread-content" rows="6" placeholder="Write your message here..."></textarea>
      <button onclick="createThread()">Post Thread</button>
    </div>

    <div class="threads-container" id="threads-list">
      <!-- Threads load here -->
    </div>
  </div>

  <script>
    // ================== PASTE YOUR FIREBASE CONFIG HERE ==================
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY_HERE",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "123456789012",
      appId: "YOUR_APP_ID_HERE"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    // Update UI based on login state
    function updateUI(user) {
      const isLoggedIn = !!user;
      
      document.getElementById("auth-box").style.display = isLoggedIn ? "none" : "block";
      document.getElementById("new-thread-box").style.display = isLoggedIn ? "block" : "none";
      
      if (user) {
        document.getElementById("username").textContent = user.displayName || user.email.split('@')[0];
      } else {
        document.getElementById("username").textContent = "Not logged in";
      }
    }

    // Sign Up
    function signUp() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        alert("Please enter email and password");
        return;
      }

      auth.createUserWithEmailAndPassword(email, password)
        .then((userCredential) => {
          alert("Account created successfully! You are now logged in.");
          updateUI(userCredential.user);
        })
        .catch(error => alert("Sign up error: " + error.message));
    }

    // Login
    function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        alert("Please enter email and password");
        return;
      }

      auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
          alert("Logged in successfully!");
          updateUI(userCredential.user);
        })
        .catch(error => alert("Login error: " + error.message));
    }

    // Logout
    function logout() {
      auth.signOut().then(() => {
        alert("Logged out");
        updateUI(null);
      });
    }

    // Load threads
    function loadThreads() {
      const threadsRef = database.ref('general/threads');
      threadsRef.on('value', (snapshot) => {
        const data = snapshot.val();
        let html = '';

        if (data) {
          Object.keys(data).reverse().forEach(key => {
            const t = data[key];
            html += `
              <div class="thread" onclick="alert('Thread: ${t.title}\\nBy: ${t.author}\\n\\n${t.content ? t.content.substring(0, 150) : ''}...')">
                <div class="thread-title">${t.title}</div>
                <div class="thread-meta">
                  Posted by ${t.author} • ${new Date(t.timestamp).toLocaleString()}
                </div>
              </div>`;
          });
        } else {
          html = '<p style="padding:30px; text-align:center; color:#666;">No threads yet. Be the first to post!</p>';
        }

        document.getElementById('threads-list').innerHTML = html;
      });
    }

    // Create new thread
    function createThread() {
      const title = document.getElementById('thread-title').value.trim();
      const content = document.getElementById('thread-content').value.trim();

      if (!title || !content) {
        alert("Please enter both title and message!");
        return;
      }

      const user = auth.currentUser;
      if (!user) return;

      database.ref('general/threads').push({
        title: title,
        content: content,
        author: user.displayName || user.email.split('@')[0],
        timestamp: Date.now()
      }).then(() => {
        document.getElementById('thread-title').value = '';
        document.getElementById('thread-content').value = '';
        alert("Thread posted successfully! 🎉");
      }).catch(err => alert("Error: " + err.message));
    }

    // Initialize
    auth.onAuthStateChanged(updateUI);
    window.onload = loadThreads;
  </script>
</body>
</html>
