<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Robloxians - 2012 Legacy</title>
    <style>
        body { font-family: "MS Sans Serif", Geneva, sans-serif; margin: 0; background: #ccc url('https://wallpapercave.com/wp/wp9084955.jpg') fixed center; background-size: cover; }
        header { background: #0055ff; color: white; padding: 8px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #0033aa; }
        
        /* BANNER FIX */
        #announcement-container { background: #ff9800; border-bottom: 2px solid #cc7a00; color: #fff; padding: 12px; font-weight: bold; text-align: center; display: none; font-size: 14px; position: relative; z-index: 99; }
        
        .main-wrapper { width: 950px; margin: 20px auto; background: rgba(238, 238, 238, 0.95); border: 1px solid #888; min-height: 600px; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.4); }
        .hidden { display: none !important; }
        .btn { background: #e1e1e1; border: 1px solid #777; padding: 5px 15px; cursor: pointer; font-size: 12px; font-weight: bold; margin: 2px; }
        .btn-submit { background: #ffcc00; border-color: #ccaa00; }
        .btn-danger { background: #ff4444; color: white; border: 1px solid #aa0000; }
        .btn-admin { background: #ffff00; color: #000; border: 1px solid #777; }
        
        /* AVATAR RENDERING */
        .avatar-frame { width: 80px; height: 110px; position: relative; background: #e1e1e1; border: 1px solid #999; display: flex; flex-direction: column; align-items: center; transform: scale(0.8); margin-top: 15px; overflow: visible; }
        .char-head { width: 20px; height: 20px; border: 1px solid rgba(0,0,0,0.2); z-index: 5; position: relative; }
        .char-torso { width: 40px; height: 40px; border: 1px solid rgba(0,0,0,0.2); position: relative; }
        .char-arm { width: 15px; height: 38px; border: 1px solid rgba(0,0,0,0.2); position: absolute; top: 0; }
        .arm-l { left: -16px; transform: rotate(5deg); }
        .arm-r { right: -16px; transform: rotate(-5deg); }
        .char-leg { width: 18px; height: 40px; border: 1px solid rgba(0,0,0,0.2); display: inline-block; }
        
        /* HATS */
        .hat-top-hat { width: 24px; height: 15px; background: #222; position: absolute; top: -14px; left: -2px; border: 1px solid #000; z-index: 10; }
        .hat-top-hat::after { content: ''; width: 34px; height: 3px; background: #222; position: absolute; bottom: -1px; left: -5px; border: 1px solid #000; }
        
        .hat-domino { width: 34px; height: 34px; position: absolute; top: -28px; left: -7px; z-index: 10; background: url('domino crown.png') no-repeat center; background-size: contain; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3)); }

        .ceo-glow { outline: 3px solid gold !important; box-shadow: 0 0 15px gold; }
        .user-id-tag { font-size: 10px; color: #666; margin-bottom: 5px; }

        .thread-row { border-bottom: 1px solid #ddd; padding: 12px; background: #fff; display: flex; align-items: center; position: relative; }
        .delete-btn { position: absolute; right: 10px; top: 10px; font-size: 10px; padding: 2px 5px; color: red; border: 1px solid red; background: none; cursor: pointer; }
        
        #admin-panel { border: 2px solid #0055ff; padding: 15px; background: #fff; margin-bottom: 15px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold; font-size: 18px;">ROBLOX - The Robloxians</div>
    <div id="user-display">Guest</div>
</header>

<div id="announcement-container"><span id="announcement-display"></span></div>

<div class="main-wrapper">
    <div id="auth-view" class="auth-box" style="text-align:center; padding:40px;">
        <h2 style="color:#0055ff;">Sign in to The Robloxians</h2>
        <input type="text" id="reg-user" placeholder="Username" style="display:block; margin:10px auto; padding:8px; width:250px;">
        <input type="email" id="auth-email" placeholder="Email Address" style="display:block; margin:10px auto; padding:8px; width:250px;">
        <input type="password" id="auth-pass" placeholder="Password" style="display:block; margin:10px auto; padding:8px; width:250px;">
        <button class="btn" id="loginBtn">Login</button>
        <button class="btn btn-submit" id="signupBtn">Create Account</button>
    </div>

    <div id="logged-in-view" class="hidden">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center;">
            <div id="welcome-text" style="font-weight:bold;"></div>
            <div>
                <button class="btn" onclick="showView('forum-home')">Forum</button>
                <button class="btn" id="myProfileBtn">My Profile</button>
                <button class="btn btn-admin hidden" id="adminBtn">Staff Tools</button>
                <button class="btn btn-danger" id="logoutBtn">Logout</button>
            </div>
        </div>

        <div id="admin-panel" class="hidden">
            <h3 style="margin-top:0;">Staff Tools</h3>
            <div id="admin-only-section" class="hidden">
                <strong>Global Banner:</strong> 
                <input type="text" id="announce-text" placeholder="Update site banner..." style="width:60%;">
                <button class="btn btn-submit" id="postAnnounce">Update Banner</button>
                <hr>
                <strong>Manage Ranks:</strong><br>
                UID: <input type="text" id="rank-uid" placeholder="User ID">
                Rank: <select id="rank-select" class="btn"><option value="0">Player</option><option value="1">Moderator</option><option value="2">Admin</option></select>
                <button class="btn btn-submit" id="applyRank">Save Rank</button>
                <hr>
            </div>
            <strong>Moderation:</strong><br>
            Target UID: <input type="text" id="target-uid" placeholder="User ID">
            <button class="btn btn-danger" id="applyBan">Ban User</button>
            <button class="btn" id="applyUnban">Unban User</button>
        </div>

        <div id="forum-home">
            <textarea id="post-input" placeholder="What's on your mind?" style="width:100%; height: 50px;"></textarea>
            <button class="btn btn-submit" id="submitPost">Post Message</button>
            <div id="thread-display" style="margin-top: 20px;"></div>
        </div>

        <div id="profile-view" class="hidden">
            <div style="display:flex; background:white; padding:20px; border:1px solid #ccc; gap:30px;">
                <div id="profile-render" style="transform: scale(1.4); margin: 20px;"></div>
                <div style="flex-grow: 1;">
                    <h2 id="view-username" style="margin:0;">User</h2>
                    <div id="view-id" class="user-id-tag">UID: 0</div>
                    <p id="view-bio" style="border-left: 3px solid #0055ff; padding: 10px; background: #f9f9f9;">Legacy Member</p>
                    
                    <div id="customizer-box" class="hidden" style="margin-top:20px; padding-top:10px; border-top: 1px dashed #ccc;">
                        <strong>Edit Character</strong><br>
                        <div style="margin: 10px 0;">
                            Bio: <input type="text" id="edit-bio" style="width:80%;"><br><br>
                            Skin: <input type="color" id="color-h"> 
                            Torso: <input type="color" id="color-t"> 
                            Legs: <input type="color" id="color-l">
                        </div>
                        <div>
                            Hat: <select id="hat-select">
                                <option value="none">None</option>
                                <option value="tophat">Top Hat</option>
                                <option value="domino">Domino Crown</option>
                            </select>
                        </div>
                        <button class="btn btn-submit" id="saveProfile" style="margin-top:10px;">Update Profile</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, push, onValue, get, child, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyANfmR8j_Z7mHmSO1GNXGnIGKTdBiU6uiU",
        authDomain: "testingforum-669a9.firebaseapp.com",
        databaseURL: "https://testingforum-669a9-default-rtdb.firebaseio.com",
        projectId: "testingforum-669a9",
        storageBucket: "testingforum-669a9.firebasestorage.app",
        messagingSenderId: "685025117821",
        appId: "1:685025117821:web:c3340c8d5475e33eded314"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const OWNER_EMAIL = "fahid.001x@gmail.com";
    const CEO_UID = "oJm6Z87yVpMe5YgO7G4H0vU7T9m2";
    let currentUserRank = 0;

    function createAvatarHTML(colors, isCEO, hat) {
        let hatHtml = '';
        if(hat === 'tophat') hatHtml = `<div class="hat-top-hat"></div>`;
        if(hat === 'domino') hatHtml = `<div class="hat-domino"></div>`;
        
        const c = colors || {h:'#f5cd30', t:'#0d5f97', l:'#a06110'};
        return `<div class="avatar-frame ${isCEO ? 'ceo-glow' : ''}">
            <div class="char-head" style="background:${c.h}">${hatHtml}</div>
            <div class="char-torso" style="background:${c.t}"><div class="char-arm arm-l" style="background:${c.h}"></div><div class="char-arm arm-r" style="background:${c.h}"></div></div>
            <div style="display:flex;"><div class="char-leg" style="background:${c.l}"></div><div class="char-leg" style="background:${c.l}"></div></div>
        </div>`;
    }

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            onValue(ref(db, `users/${user.uid}`), (snap) => {
                const data = snap.val();
                if(!data) return;
                if(data.banned) { signOut(auth).then(()=>location.reload()); return; }
                
                currentUserRank = data.rank || 0;
                if(currentUserRank >= 1 || user.email === OWNER_EMAIL) {
                    document.getElementById('adminBtn').classList.remove('hidden');
                    if(currentUserRank >= 2 || user.email === OWNER_EMAIL) document.getElementById('admin-only-section').classList.remove('hidden');
                }
                document.getElementById('welcome-text').innerText = "Hello, " + data.username;
                document.getElementById('user-display').innerText = data.username;
            });

            // BANNER LISTENER (FIXED)
            onValue(ref(db, 'announcement/text'), (s) => {
                const banner = document.getElementById('announcement-container');
                if(s.exists() && s.val() !== "") {
                    document.getElementById('announcement-display').innerText = s.val();
                    banner.style.display = 'block';
                } else banner.style.display = 'none';
            });

            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('logged-in-view').classList.remove('hidden');

            onValue(ref(db, 'threads'), async (s) => {
                const display = document.getElementById('thread-display');
                display.innerHTML = "";
                const usersSnap = await get(child(ref(db), 'users'));
                const allUsers = usersSnap.val() || {};
                s.forEach(c => {
                    const postId = c.key; const p = c.val(); const author = allUsers[p.uid] || {};
                    const canDelete = (currentUserRank >= 1) || (p.uid === auth.currentUser.uid);
                    const div = document.createElement('div');
                    div.className = 'thread-row';
                    div.innerHTML = `${createAvatarHTML(author.colors, p.uid === CEO_UID, author.hat)}
                        <div style="margin-left:20px;">
                            <strong style="color:#0055ff; cursor:pointer;" onclick="loadProfile('${p.uid}')">${author.username}</strong><br>${p.message}
                        </div>
                        ${canDelete ? `<button class="delete-btn" onclick="deletePost('${postId}')">Delete</button>` : ""}`;
                    display.prepend(div);
                });
            });
        } else { document.getElementById('auth-view').classList.remove('hidden'); }
    });

    // STAFF FUNCTIONS
    document.getElementById('postAnnounce').onclick = () => set(ref(db, 'announcement/text'), document.getElementById('announce-text').value);
    document.getElementById('applyBan').onclick = () => update(ref(db, `users/${document.getElementById('target-uid').value}`), { banned: true });
    document.getElementById('applyUnban').onclick = () => update(ref(db, `users/${document.getElementById('target-uid').value}`), { banned: false });
    document.getElementById('applyRank').onclick = () => update(ref(db, `users/${document.getElementById('rank-uid').value}`), { rank: parseInt(document.getElementById('rank-select').value) });

    window.loadProfile = async (uid) => {
        showView('profile-view');
        const snap = await get(child(ref(db), `users/${uid}`));
        const d = snap.val();
        document.getElementById('view-username').innerText = d.username;
        document.getElementById('view-id').innerText = "UID: " + uid;
        document.getElementById('view-bio').innerText = d.bio || "Legacy Member";
        document.getElementById('profile-render').innerHTML = createAvatarHTML(d.colors, uid === CEO_UID, d.hat);
        if(uid === auth.currentUser.uid) {
            document.getElementById('customizer-box').classList.remove('hidden');
            document.getElementById('edit-bio').value = d.bio || "";
            document.getElementById('color-h').value = d.colors?.h || "#f5cd30";
            document.getElementById('color-t').value = d.colors?.t || "#0d5f97";
            document.getElementById('color-l').value = d.colors?.l || "#a06110";
            document.getElementById('hat-select').value = d.hat || "none";
        } else document.getElementById('customizer-box').classList.add('hidden');
    };

    document.getElementById('saveProfile').onclick = () => {
        update(ref(db, `users/${auth.currentUser.uid}`), {
            bio: document.getElementById('edit-bio').value,
            hat: document.getElementById('hat-select').value,
            colors: { h: document.getElementById('color-h').value, t: document.getElementById('color-t').value, l: document.getElementById('color-l').value }
        }).then(() => alert("Saved!"));
    };

    document.getElementById('submitPost').onclick = () => {
        const msg = document.getElementById('post-input').value;
        if(msg.trim()) push(ref(db, 'threads'), { message: msg, uid: auth.currentUser.uid });
        document.getElementById('post-input').value = "";
    };

    window.deletePost = (id) => remove(ref(db, `threads/${id}`));
    window.showView = (id) => { document.getElementById('forum-home').classList.add('hidden'); document.getElementById('profile-view').classList.add('hidden'); document.getElementById(id).classList.remove('hidden'); };
    document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-pass').value);
    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());
    document.getElementById('myProfileBtn').onclick = () => loadProfile(auth.currentUser.uid);
    document.getElementById('adminBtn').onclick = () => document.getElementById('admin-panel').classList.toggle('hidden');
    document.getElementById('signupBtn').onclick = () => {
        const user = document.getElementById('reg-user').value;
        createUserWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-pass').value).then((res) => {
            set(ref(db, `users/${res.user.uid}`), { username: user, rank: 0, banned: false, colors: {h:'#f5cd30', t:'#0d5f97', l:'#a06110'}, hat: 'none', bio: 'New Member' });
        });
    };
</script>
</body>
</html>
