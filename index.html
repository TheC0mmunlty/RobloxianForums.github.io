<!DOCTYPE html>
<html>
<head>
<title>Block Fan Forum</title>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  font-family: Arial;
  color: white;
}

.topbar {
  background: #111b2e;
  padding: 10px;
  font-weight: bold;
}

.container {
  width: 800px;
  margin: 20px auto;
}

.box {
  background: #151515;
  border: 1px solid #333;
  padding: 10px;
  margin-bottom: 10px;
}

input, textarea, select {
  width: 100%;
  margin-top: 5px;
  padding: 6px;
  background: black;
  color: white;
  border: 1px solid #333;
}

button {
  margin-top: 5px;
  padding: 6px;
  background: #3b6ea5;
  color: white;
  border: none;
  cursor: pointer;
}

.post {
  background: #121212;
  border: 1px solid #333;
  margin: 10px 0;
  padding: 10px;
}
</style>
</head>

<body>

<div class="topbar">🧱 Block Fan Forum</div>

<div class="container">

<!-- LOGIN -->
<div id="authBox" class="box">
<h3>Login / Signup</h3>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<!-- FORUM -->
<div id="forumBox" style="display:none;">

<div class="box">
<h3>Create Post</h3>

<input id="user" placeholder="Username">

<select id="category">
  <option>General</option>
  <option>Help</option>
  <option>Off-topic</option>
</select>

<textarea id="msg" placeholder="Write post..."></textarea>
<button onclick="createPost(user.value, msg.value, category.value)">
Post
</button>
</div>

<div id="posts"></div>

</div>

</div>

<!-- FIREBASE + FORUM LOGIC -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyANfmR8j_Z7mHmSO1GNXGnIGKTdBiU6uiU",
  authDomain: "testingforum-669a9.firebaseapp.com",
  projectId: "testingforum-669a9",
  storageBucket: "testingforum-669a9.firebasestorage.app",
  messagingSenderId: "685025117821",
  appId: "1:685025117821:web:12f3c1bca79906a3ded314"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;

// 🔐 AUTH
window.signup = () => createUserWithEmailAndPassword(auth, email.value, pass.value);
window.login = () => signInWithEmailAndPassword(auth, email.value, pass.value);

onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user.email;

    authBox.style.display = "none";
    forumBox.style.display = "block";
  }
});

// 💬 CREATE POST
window.createPost = async function(user, text, category) {
  if (!text) return;

  await addDoc(collection(db, "posts"), {
    user,
    text,
    category,
    time: Date.now()
  });

  msg.value = "";
};

// 🛡 ADMIN
const admins = ["you@gmail.com"];
function isAdmin(email) {
  return admins.includes(email);
}

// 🗑 DELETE
window.deletePost = async function(id) {
  if (!isAdmin(currentUser)) {
    alert("No permission");
    return;
  }

  await deleteDoc(doc(db, "posts", id));
};

// 🔥 LOAD POSTS (AUTO LIVE SYSTEM)
const q = query(collection(db, "posts"), orderBy("time","desc"));

onSnapshot(q, snap => {
  posts.innerHTML = "";

  snap.forEach(docSnap => {
    let d = docSnap.data();
    let id = docSnap.id;

    let div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <b>${d.user}</b> [${d.category}]<br>
      ${d.text}
      <br><br>

      <button onclick="deletePost('${id}')">Delete</button>
    `;

    posts.appendChild(div);
  });
});
</script>

</body>
</html>
