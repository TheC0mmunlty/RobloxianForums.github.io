<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROBLOX Forums - 2014</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <style>
    body {
      font-family: "Tahoma", "Arial", sans-serif;
      background: #e0e0e0;
      color: #333;
      margin: 0;
      padding: 0;
    }

    .header {
      background: linear-gradient(#003366, #001a33);
      color: #ffcc00;
      padding: 18px;
      text-align: center;
      border-bottom: 5px solid #ffcc00;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 2px 2px 0 #000;
    }

    .nav {
      background: #003366;
      padding: 10px;
      text-align: center;
    }

    .nav a {
      color: #ffcc00;
      margin: 0 18px;
      text-decoration: none;
      font-weight: bold;
      font-size: 15px;
    }

    .container {
      max-width: 980px;
      margin: 20px auto;
      background: white;
      border: 4px solid #003366;
      box-shadow: 4px 4px 0 #000;
    }

    .category {
      background: #003366;
      color: #ffcc00;
      padding: 12px 15px;
      font-size: 18px;
      font-weight: bold;
      border-bottom: 3px solid #ffcc00;
    }

    .thread {
      padding: 14px 15px;
      border-bottom: 1px solid #ccc;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .thread:hover {
      background: #ffffcc;
    }

    .thread-info {
      flex: 1;
    }

    .thread-title {
      font-weight: bold;
      color: #003366;
    }

    .thread-author {
      font-size: 13px;
      color: #666;
    }

    .timestamp {
      color: #666;
      font-size: 12px;
      text-align: right;
    }

    .new-thread-box {
      margin: 20px;
      padding: 15px;
      background: #f9f9f9;
      border: 3px solid #ffcc00;
    }

    input[type="text"], textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 2px solid #003366;
      font-family: Tahoma;
    }

    button {
      background: #003366;
      color: #ffcc00;
      border: 3px solid #ffcc00;
      padding: 10px 20px;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #ffcc00;
      color: #003366;
    }

    .logged-in {
      float: right;
      color: #ffcc00;
      font-size: 14px;
      margin-top: 5px;
    }
  </style>
</head>
<body>

  <div class="header">
    ROBLOX OLD FORUMS - 2014
  </div>

  <div class="nav">
    <a href="#">General Discussion</a>
    <a href="#">Help & Support</a>
    <a href="#">Off Topic</a>
    <a href="#">Suggestions</a>
    <span class="logged-in">Logged in as: <strong id="username">Loading...</strong></span>
  </div>

  <div class="container">
    <div class="category">General Discussion</div>
    
    <div id="threads-list">
      <!-- Threads will load here automatically -->
    </div>

    <div class="new-thread-box">
      <h3 style="margin-top:0; color:#003366;">Create New Thread</h3>
      <input type="text" id="thread-title" placeholder="Thread Title (be specific!)">
      <textarea id="thread-content" rows="5" placeholder="Write your message here..."></textarea>
      <button onclick="createThread()">Post Thread</button>
    </div>
  </div>

  <script>
    // ================== YOUR FIREBASE CONFIG ==================
    // PASTE YOUR FIREBASE CONFIG HERE (from Firebase console)
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY_HERE",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "123456789",
      appId: "YOUR_APP_ID"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    // Show logged in user
    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById("username").textContent = user.displayName || user.email.split('@')[0];
      } else {
        document.getElementById("username").textContent = "Not logged in";
      }
    });

    // Load threads in real-time
    function loadThreads() {
      const threadsRef = database.ref('general/threads');
      
      threadsRef.on('value', (snapshot) => {
        const data = snapshot.val();
        let html = '';

        if (data) {
          Object.keys(data).reverse().forEach(key => {
            const thread = data[key];
            html += `
              <div class="thread" onclick="alert('Thread view coming soon!\\n\\nTitle: ${thread.title}\\nBy: ${thread.author}')">
                <div class="thread-info">
                  <div class="thread-title">${thread.title}</div>
                  <div class="thread-author">Posted by ${thread.author}</div>
                </div>
                <div class="timestamp">
                  ${new Date(thread.timestamp).toLocaleString()}
                </div>
              </div>`;
          });
        } else {
          html = '<p style="padding:20px; text-align:center; color:#666;">No threads yet. Be the first to post!</p>';
        }

        document.getElementById('threads-list').innerHTML = html;
      });
    }

    // Create new thread
    function createThread() {
      const title = document.getElementById('thread-title').value.trim();
      const content = document.getElementById('thread-content').value.trim();

      if (!title || !content) {
        alert("Please fill in both title and message!");
        return;
      }

      const user = auth.currentUser;
      if (!user) {
        alert("You need to be logged in to post!");
        return;
      }

      const newThread = {
        title: title,
        content: content,
        author: user.displayName || user.email.split('@')[0],
        timestamp: Date.now()
      };

      database.ref('general/threads').push(newThread)
        .then(() => {
          document.getElementById('thread-title').value = '';
          document.getElementById('thread-content').value = '';
          alert("Thread posted successfully! 🎉");
        })
        .catch(error => {
          alert("Error posting: " + error.message);
        });
    }

    // Load threads when page opens
    window.onload = loadThreads;
  </script>

</body>
</html>
