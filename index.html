<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Robloxians - Legacy Fix</title>
    <style>
        body { font-family: "MS Sans Serif", Geneva, sans-serif; margin: 0; background: #ccc url('https://wallpapercave.com/wp/wp9084955.jpg') fixed center; background-size: cover; }
        header { background: #0055ff; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #0033aa; }
        .main-wrapper { width: 950px; margin: 20px auto; background: rgba(238, 238, 238, 0.95); border: 1px solid #888; min-height: 600px; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.4); }
        .hidden { display: none !important; }
        .btn { background: #e1e1e1; border: 1px solid #777; padding: 5px 15px; cursor: pointer; font-size: 12px; font-weight: bold; margin: 2px; }
        .btn-submit { background: #ffcc00; border-color: #ccaa00; }
        
        /* CHARACTER RENDERING - 2012 BLOCKY STYLE */
        .avatar-frame { width: 100px; height: 130px; position: relative; background: #d0d0d0; border: 1px solid #999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-top: 10px;}
        .char-head { width: 24px; height: 24px; border: 1px solid rgba(0,0,0,0.3); z-index: 5; position: relative; margin-bottom: 2px;}
        .char-torso { width: 48px; height: 48px; border: 1px solid rgba(0,0,0,0.3); position: relative; z-index: 4;}
        .char-arm { width: 22px; height: 46px; border: 1px solid rgba(0,0,0,0.3); position: absolute; top: 0; }
        .arm-l { left: -24px; } .arm-r { right: -24px; }
        .char-legs-container { display: flex; gap: 2px; margin-top: 2px; }
        .char-leg { width: 23px; height: 48px; border: 1px solid rgba(0,0,0,0.3); }
        
        /* HAT FIXES */
        .hat-domino { width: 30px; height: 8px; background: #111; position: absolute; top: -6px; left: -4px; border: 1px solid #fff; box-shadow: 0 0 2px black; }
        .hat-domino::before { content: '...'; color: white; font-size: 14px; position: absolute; top: -7px; left: 5px; letter-spacing: 1px; }
        .hat-tophat { width: 28px; height: 4px; background: #000; position: absolute; top: -4px; left: -3px; }
        .hat-tophat::after { content: ''; width: 18px; height: 18px; background: #000; position: absolute; top: -18px; left: 5px; border: 1px solid #333; }

        .thread-row { border-bottom: 1px solid #ddd; padding: 12px; background: #fff; display: flex; align-items: center; }
        #notif-toast { position: fixed; bottom: 20px; right: 20px; background: #0055ff; color: white; padding: 15px; border: 2px solid white; opacity: 0; transition: 0.5s; pointer-events: none; z-index: 9999; }
        #notif-toast.show { opacity: 1; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold; font-size: 18px;">The Robloxians</div>
    <div id="user-display">Connecting...</div>
</header>

<div id="notif-toast"></div>

<div class="main-wrapper">
    <div id="auth-view" style="text-align:center; padding:40px;">
        <h2>Login / Sign Up</h2>
        <input type="text" id="reg-user" placeholder="Username" style="display:block; margin:10px auto; padding:8px;">
        <input type="email" id="auth-email" placeholder="Email" style="display:block; margin:10px auto; padding:8px;">
        <input type="password" id="auth-pass" placeholder="Password" style="display:block; margin:10px auto; padding:8px;">
        <button class="btn btn-submit" id="loginBtn">Login</button>
        <button class="btn" id="signupBtn">Create Account</button>
    </div>

    <div id="logged-in-view" class="hidden">
        <div style="margin-bottom: 20px;">
            <button class="btn" onclick="showView('forum-home')">Forum Feed</button>
            <button class="btn" id="myProfileBtn">View My Profile</button>
            <button class="btn" style="background:#ff4444; color:white;" id="logoutBtn">Logout</button>
        </div>

        <div id="forum-home">
            <textarea id="post-input" placeholder="Say something to the world..." style="width:100%; height: 50px;"></textarea>
            <button class="btn btn-submit" id="submitPost">Post to Feed</button>
            <div id="thread-display" style="margin-top: 20px;"></div>
        </div>

        <div id="profile-view" class="hidden">
            <div style="display:flex; background:white; padding:20px; border:1px solid #ccc; gap:30px;">
                <div id="profile-render"></div>
                <div style="flex-grow: 1;">
                    <h2 id="view-username" style="margin:0;">User</h2>
                    <p id="view-bio" style="background:#f0f0f0; padding:10px; border:1px solid #ddd;">No bio.</p>
                    
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:20px;">
                        <div>
                            <strong>Private Inbox</strong>
                            <div id="inbox-list" style="height:150px; overflow-y:auto; background:#fff; border:1px solid #ccc; padding:5px; font-size:11px; margin-bottom:5px;"></div>
                            <input type="text" id="pm-input" placeholder="Reply..." style="width:65%;">
                            <button class="btn btn-submit" id="sendPmBtn">Send</button>
                        </div>
                        <div id="customizer-box" class="hidden">
                            <strong>Edit Avatar & Bio</strong><br>
                            Bio: <input type="text" id="edit-bio" style="width:90%;"><br>
                            Hat: <select id="hat-select">
                                <option value="none">None</option>
                                <option value="domino">Domino Crown</option>
                                <option value="tophat">Top Hat</option>
                            </select><br>
                            Head Color: <input type="color" id="color-h"><br>
                            Torso Color: <input type="color" id="color-t"><br>
                            Legs Color: <input type="color" id="color-l"><br>
                            <button class="btn btn-submit" id="saveProfile" style="width:100%; margin-top:10px;">Update Profile</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, push, onValue, get, child, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyANfmR8j_Z7mHmSO1GNXGnIGKTdBiU6uiU",
        authDomain: "testingforum-669a9.firebaseapp.com",
        databaseURL: "https://testingforum-669a9-default-rtdb.firebaseio.com",
        projectId: "testingforum-669a9",
        storageBucket: "testingforum-669a9.firebasestorage.app",
        messagingSenderId: "685025117821",
        appId: "1:685025117821:web:c3340c8d5475e33eded314"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    let currentUserData = null;
    let sessionStartTime = Date.now();

    function createAvatarHTML(colors, hat) {
        // HAT LOGIC FIX: Explicitly checks for none
        let hatHtml = '';
        if (hat === 'domino') hatHtml = `<div class="hat-domino"></div>`;
        if (hat === 'tophat') hatHtml = `<div class="hat-tophat"></div>`;
        
        const c = colors || {h:'#f5cd30', t:'#0d5f97', l:'#a06110'};
        return `
            <div class="avatar-frame">
                <div class="char-head" style="background:${c.h}">${hatHtml}</div>
                <div class="char-torso" style="background:${c.t}">
                    <div class="char-arm arm-l" style="background:${c.h}"></div>
                    <div class="char-arm arm-r" style="background:${c.h}"></div>
                </div>
                <div class="char-legs-container">
                    <div class="char-leg" style="background:${c.l}"></div>
                    <div class="char-leg" style="background:${c.l}"></div>
                </div>
            </div>`;
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            sessionStartTime = Date.now();
            onValue(ref(db, `users/${user.uid}`), (snap) => {
                currentUserData = snap.val();
                if (currentUserData) {
                    document.getElementById('user-display').innerText = "Logged in as: " + currentUserData.username;
                    // Sync the inputs to match the current data
                    document.getElementById('edit-bio').value = currentUserData.bio || "";
                    document.getElementById('hat-select').value = currentUserData.hat || "none";
                    document.getElementById('color-h').value = currentUserData.colors?.h || "#f5cd30";
                    document.getElementById('color-t').value = currentUserData.colors?.t || "#0d5f97";
                    document.getElementById('color-l').value = currentUserData.colors?.l || "#a06110";
                }
            });

            onValue(ref(db, `inbox/${user.uid}`), (snap) => {
                let newestMsg = null;
                snap.forEach(m => { newestMsg = m.val(); });
                if(newestMsg && newestMsg.timestamp > sessionStartTime) {
                    const toast = document.getElementById('notif-toast');
                    toast.innerText = "New Message: " + newestMsg.msg;
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 5000);
                }
            });

            renderForum();
            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('logged-in-view').classList.remove('hidden');
        }
    });

    const renderForum = () => {
        onValue(ref(db, 'threads'), async (s) => {
            const display = document.getElementById('thread-display'); display.innerHTML = "";
            const usersSnap = await get(child(ref(db), 'users'));
            const allUsers = usersSnap.val() || {};
            s.forEach(c => {
                const p = c.val();
                const author = allUsers[p.uid] || {username: "Unknown"};
                const div = document.createElement('div'); div.className = 'thread-row';
                div.innerHTML = `
                    <div style="margin-right:15px; transform: scale(0.5); width:60px;">${createAvatarHTML(author.colors, author.hat)}</div>
                    <div>
                        <strong style="color:#0055ff; cursor:pointer;" onclick="window.loadProfile('${p.uid}')">${author.username}</strong>
                        <div style="font-size:13px;">${p.message}</div>
                    </div>`;
                display.prepend(div);
            });
        });
    };

    window.loadProfile = async (uid) => {
        window.currentViewingUid = uid;
        showView('profile-view');
        const snap = await get(child(ref(db), `users/${uid}`));
        const d = snap.val();
        document.getElementById('view-username').innerText = d.username;
        document.getElementById('view-bio').innerText = d.bio || "No bio.";
        document.getElementById('profile-render').innerHTML = createAvatarHTML(d.colors, d.hat);
        
        onValue(ref(db, `inbox/${uid}`), (s) => {
            const list = document.getElementById('inbox-list'); list.innerHTML = "";
            s.forEach(m => { list.innerHTML += `<div><b>${m.val().from}:</b> ${m.val().msg}</div>`; });
            list.scrollTop = list.scrollHeight;
        });
        document.getElementById('customizer-box').classList.toggle('hidden', uid !== auth.currentUser.uid);
    };

    // FIXED SEND PM: Ensures we have a valid username before sending
    document.getElementById('sendPmBtn').onclick = () => {
        const msg = document.getElementById('pm-input').value;
        if(!msg.trim()) return;
        
        // Wait for user data to avoid "undefined"
        const myName = currentUserData ? currentUserData.username : "Member";
        
        push(ref(db, `inbox/${window.currentViewingUid}`), { 
            from: myName, 
            msg: msg,
            timestamp: Date.now() 
        });
        document.getElementById('pm-input').value = "";
    };

    document.getElementById('submitPost').onclick = () => {
        const msg = document.getElementById('post-input').value;
        if(!msg.trim()) return;
        push(ref(db, 'threads'), { message: msg, uid: auth.currentUser.uid, timestamp: Date.now() });
        document.getElementById('post-input').value = "";
    };

    window.showView = (id) => {
        document.getElementById('forum-home').classList.add('hidden');
        document.getElementById('profile-view').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
    };

    document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-pass').value);
    document.getElementById('signupBtn').onclick = () => {
        const u = document.getElementById('reg-user').value;
        createUserWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-pass').value).then((r) => {
            set(ref(db, `users/${r.user.uid}`), { username: u, bio: 'New Member', colors: {h:'#f5cd30', t:'#0d5f97', l:'#a06110'}, hat: 'none' });
        });
    };
    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(()=>location.reload());
    document.getElementById('myProfileBtn').onclick = () => window.loadProfile(auth.currentUser.uid);
    
    document.getElementById('saveProfile').onclick = () => {
        const updates = {
            bio: document.getElementById('edit-bio').value,
            hat: document.getElementById('hat-select').value,
            colors: { 
                h: document.getElementById('color-h').value, 
                t: document.getElementById('color-t').value, 
                l: document.getElementById('color-l').value 
            }
        };
        update(ref(db, `users/${auth.currentUser.uid}`), updates).then(() => {
            alert("Profile Updated!");
            window.loadProfile(auth.currentUser.uid);
        });
    };
</script>
</body>
</html>
