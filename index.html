<!DOCTYPE html>
<html>
<head>
<title>Forum System Fixed</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#dfe5ec;
}

/* TOPBAR */
.topbar {
  background:#3b4f6b;
  color:white;
  padding:10px;
  display:flex;
  align-items:center;
  gap:10px;
}

.logo {
  height:30px;
  cursor:pointer;
}

/* MENU */
.menu {
  display:flex;
  gap:10px;
  margin-left:20px;
}

.menu button {
  padding:5px 10px;
  cursor:pointer;
}

/* SECTIONS */
.section {
  display:none;
  width:850px;
  margin:20px auto;
}

.active {
  display:block;
}

/* BOX */
.box {
  background:white;
  border:1px solid #bbb;
  padding:10px;
  margin-bottom:10px;
}

/* POSTS */
.post {
  background:white;
  border:1px solid #bbb;
  padding:10px;
  margin-top:10px;
}

/* ADMIN */
#adminPanel {
  background:#fff3f3;
}

/* PROFILE */
#profile {
  display:none;
  position:fixed;
  top:20%;
  left:50%;
  transform:translateX(-50%);
  background:white;
  border:2px solid #333;
  padding:10px;
  width:300px;
  z-index:999;
}

button { margin-top:5px; }
input, textarea { width:100%; margin-top:5px; padding:5px; }
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">

<img class="logo"
src="https://cdn.discordapp.com/attachments/1495473511836291142/1497459975067275389/Logo.png"
onclick="showSection('postsSection')">

<span>Forum System</span>

<div class="menu">
  <button onclick="showSection('postsSection')">Posts</button>
  <button onclick="showSection('friendsSection')">Friends</button>
  <button onclick="showSection('clansSection')">Clans</button>
  <button onclick="showSection('groupsSection')">Groups</button>
  <button onclick="showSection('adminSection')">Admin</button>
</div>

</div>

<!-- POSTS -->
<div id="postsSection" class="section active">

<div class="box">
<h3>Create Post</h3>
<textarea id="msg"></textarea>
<button onclick="createPost()">Post</button>
</div>

<div id="posts"></div>

</div>

<!-- FRIENDS -->
<div id="friendsSection" class="section">
<div class="box">
<h3>Friends</h3>
<div id="friends"></div>
</div>
</div>

<!-- CLANS -->
<div id="clansSection" class="section">
<div class="box">
<h3>Clans</h3>
<input id="clanName" placeholder="Clan name">
<button onclick="createClan()">Create Clan</button>
<div id="clanList"></div>
</div>
</div>

<!-- GROUPS -->
<div id="groupsSection" class="section">
<div class="box">
<h3>Groups</h3>
<div id="groups"></div>
</div>
</div>

<!-- ADMIN -->
<div id="adminSection" class="section">
<div class="box" id="adminPanel">
<h3>Admin Dashboard</h3>
<textarea id="announcement"></textarea>
<button onclick="postAnnouncement()">Post Announcement</button>
</div>
</div>

<!-- PROFILE -->
<div id="profile">
<h3 id="pName"></h3>
<p id="pEmail"></p>
<button onclick="closeProfile()">Close</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import { getAuth } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyANfmR8j_Z7mHmSO1GNXGnIGKTdBiU6uiU",
  authDomain: "testingforum-669a9.firebaseapp.com",
  projectId: "testingforum-669a9",
  storageBucket: "testingforum-669a9.firebasestorage.app",
  messagingSenderId: "685025117821",
  appId: "1:685025117821:web:12f3c1bca79906a3ded314"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;

/* NAV MENU */
window.showSection = function(id){
  document.querySelectorAll(".section").forEach(s=>{
    s.classList.remove("active");
  });

  document.getElementById(id).classList.add("active");
};

/* POSTS FIX */
window.createPost = async function(){
  if(!msg.value) return;

  await addDoc(collection(db,"posts"),{
    text:msg.value,
    user:"Player",
    time:Date.now()
  });

  msg.value="";
  loadPosts();
};

/* LOAD POSTS */
async function loadPosts(){
  let snap = await getDocs(collection(db,"posts"));
  posts.innerHTML="";

  snap.forEach(d=>{
    let p=d.data();

    let div=document.createElement("div");
    div.className="post";

    div.innerText = p.user+": "+p.text;

    posts.appendChild(div);
  });
}
loadPosts();

/* CLANS */
window.createClan = async function(){
  await addDoc(collection(db,"clans"),{
    name:clanName.value,
    owner:"Player"
  });

  loadClans();
};

async function loadClans(){
  let snap = await getDocs(collection(db,"clans"));
  clanList.innerHTML="";

  snap.forEach(d=>{
    let c=d.data();
    let div=document.createElement("div");
    div.className="post";
    div.innerText="⚔ "+c.name;

    clanList.appendChild(div);
  });
}
loadClans();

/* FRIENDS / GROUPS */
async function loadFriends(){
  friends.innerHTML="No system connected yet";
}
loadFriends();

async function loadGroups(){
  groups.innerHTML="Group system ready for upgrade";
}
loadGroups();

/* ANNOUNCEMENT */
window.postAnnouncement = async function(){
  alert("Admin panel ready (hook for Firebase)");
};

</script>

</body>
</html>
