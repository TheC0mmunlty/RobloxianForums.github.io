<!DOCTYPE html>
<html>
<head>
<title>Block Fan Forum</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #dfe5ec;
}

.topbar {
  background: #3b4f6b;
  color: white;
  padding: 10px;
  font-weight: bold;
}

.container {
  width: 850px;
  margin: 20px auto;
}

.box {
  background: #f9f9f9;
  border: 1px solid #b8c2cc;
  padding: 10px;
  margin-bottom: 10px;
}

.post {
  background: white;
  border: 1px solid #b8c2cc;
  padding: 10px;
  margin-top: 10px;
}

.adminBadge {
  width: 16px;
  vertical-align: middle;
}

#profile {
  display:none;
  position:fixed;
  top:20%;
  left:50%;
  transform:translateX(-50%);
  background:white;
  border:2px solid #333;
  padding:10px;
  width:300px;
  z-index:999;
}

button { margin-top:5px; }
input, textarea { width:100%; margin-top:5px; padding:5px; }
</style>
</head>

<body>

<div class="topbar">🧱 Block Fan Forum</div>

<div class="container">

<!-- LOGIN -->
<div id="authBox" class="box">
<h3>Login / Signup</h3>
<input id="username" placeholder="Username">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<!-- ANNOUNCEMENT -->
<div class="box" id="announcementBox">
<h3>📢 Announcements</h3>
<div id="announcementList"></div>
</div>

<!-- POST -->
<div id="forumBox" style="display:none;">

<div class="box">
<h3>Create Post</h3>
<textarea id="msg"></textarea>
<button onclick="createPost(msg.value)">Post</button>
</div>

<div id="posts"></div>

</div>

</div>

<!-- PROFILE -->
<div id="profile">
<h3>Profile</h3>
<p id="pName"></p>
<p id="pRole"></p>

<button onclick="followUser()">Follow</button>
<button onclick="openDM()">DM</button>
<button onclick="banUser()">Ban (Admin)</button>
<button onclick="closeProfile()">Close</button>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyANfmR8j_Z7mHmSO1GNXGnIGKTdBiU6uiU",
  authDomain: "testingforum-669a9.firebaseapp.com",
  projectId: "testingforum-669a9",
  storageBucket: "testingforum-669a9.firebasestorage.app",
  messagingSenderId: "685025117821",
  appId: "1:685025117821:web:12f3c1bca79906a3ded314"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* DATA */
let currentUser = null;
let currentProfile = null;

const admins = ["fahid.001x@gmail.com"];

/* AUTH */
window.signup = async () => {
  const cred = await createUserWithEmailAndPassword(auth, email.value, pass.value);

  await setDoc(doc(db, "users", cred.user.uid), {
    username: username.value,
    email: cred.user.email,
    followers: [],
    messages: []
  });
};

window.login = () =>
  signInWithEmailAndPassword(auth, email.value, pass.value);

/* USER LOGIN */
onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;

    authBox.style.display = "none";
    forumBox.style.display = "block";
  }
});

/* POSTS */
window.createPost = async function(text) {
  if (!text) return;

  await addDoc(collection(db, "posts"), {
    text,
    user: username.value,
    email: currentUser.email,
    time: Date.now()
  });
};

/* LOAD POSTS */
const q = query(collection(db, "posts"), orderBy("time","desc"));

onSnapshot(q, snap => {
  posts.innerHTML = "";

  snap.forEach(d => {
    let p = d.data();

    let isAdmin = admins.includes(p.email);

    let badge = isAdmin
      ? `<img class="adminBadge" src="https://cdn.discordapp.com/attachments/1495473511836291142/1497453590070165584/Untitled.png">`
      : "";

    let color = isAdmin ? "red" : "black";

    let div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <b style="color:${color}; cursor:pointer"
      onclick="openProfile('${p.email}','${p.user}')">
        ${p.user}
      </b>
      ${badge}
      <br>
      ${p.text}
    `;

    posts.appendChild(div);
  });
});

/* PROFILE */
window.openProfile = function(email, name) {
  currentProfile = email;

  pName.innerText = name;
  pRole.innerText = admins.includes(email) ? "Admin" : "User";

  profile.style.display = "block";
};

window.closeProfile = () => profile.style.display = "none";

/* FOLLOW (placeholder) */
window.followUser = function() {
  alert("Follow system ready for upgrade");
};

/* DM (placeholder) */
window.openDM = function() {
  alert("DM system ready for upgrade");
};

/* BAN (admin only) */
window.banUser = function() {
  if (!admins.includes(currentUser.email)) return alert("No permission");
  alert("Ban system hook ready");
};

/* ANNOUNCEMENTS */
const annQ = query(collection(db, "announcements"), orderBy("time","desc"));

onSnapshot(annQ, snap => {
  announcementList.innerHTML = "";

  snap.forEach(d => {
    let a = d.data();

    let div = document.createElement("div");
    div.className = "box";

    div.innerHTML = "📢 " + a.text;

    announcementList.appendChild(div);
  });
});

</script>

</body>
</html>
