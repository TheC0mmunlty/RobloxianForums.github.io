<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Robloxians Forum</title>
    <style>
        /* ADDING MODERN FONT BACK */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');

        body { 
            font-family: 'Poppins', Verdana, sans-serif; 
            margin: 0; padding: 0; 
            background-color: #000; 
            background-image: url('https://wallpapercave.com/wp/wp9084955.jpg'); 
            background-attachment: fixed; 
            background-size: cover; 
            background-position: center; 
        }

        header { 
            background: rgba(0, 0, 0, 0.9); 
            color: white; 
            padding: 12px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 3px solid #555; 
        }

        .main-wrapper { 
            width: 950px; 
            margin: 40px auto; 
            background: white; 
            border: 1px solid #888; 
            min-height: 800px; 
            box-shadow: 0px 0px 25px rgba(0,0,0,0.6); 
            position: relative; 
        }

        #announcement-banner { background: #FF8C00; border-bottom: 2px solid #CC7000; padding: 12px; text-align: center; font-size: 14px; font-weight: bold; color: white; display: none; }
        
        .auth-card { width: 400px; margin: 100px auto; border: 1px solid #0055ff; background: #f0f5ff; padding: 20px; text-align: center; border-radius: 8px; }
        
        input, select, textarea { width: 90%; padding: 10px; margin: 5px 0; border: 1px solid #999; font-family: 'Poppins', sans-serif; font-size: 13px; border-radius: 4px; }
        
        .forum-header { background: #333; color: white; padding: 10px; font-weight: bold; margin-top: 15px; font-size: 14px; border-radius: 4px 4px 0 0; }
        
        .thread-row { border-bottom: 1px solid #eee; padding: 15px; display: flex; justify-content: space-between; align-items: flex-start; font-size: 13px; background: #fff; }
        
        .clickable-name { color: #0055ff; cursor: pointer; text-decoration: underline; font-weight: bold; }
        
        .btn { background: #e1e1e1; border: 1px solid #777; padding: 7px 14px; cursor: pointer; font-size: 12px; font-weight: 600; border-radius: 4px; transition: 0.2s; }
        .btn:hover { background: #ccc; }
        .btn-admin { background: #ffcc00; border-color: #998800; }
        .btn-danger { background: #ff4444; color: white; border: none; }
        
        .hidden { display: none !important; }

        #profile-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 100; justify-content: center; align-items: center; }
        .profile-card { background: white; padding: 25px; border-radius: 12px; width: 350px; text-align: center; }
        
        #ban-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #ff0000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    </style>
</head>
<body>

<div id="ban-view" class="hidden">
    <h1 style="font-size: 50px;">ACCESS DENIED</h1>
    <p id="ban-reason" style="font-size: 24px; color: white;"></p>
    <p id="ban-expiry" style="font-size: 16px; opacity: 0.6; color: white;"></p>
</div>

<div id="announcement-banner"></div>

<header>
    <div style="font-weight:bold; font-size: 22px; letter-spacing: -0.5px;">THE ROBLOXIANS FORUM</div>
    <div id="user-display" style="font-size: 12px; color: #aaa;">Guest</div>
</header>

<div id="profile-overlay">
    <div class="profile-card">
        <h2 id="p-name" style="margin-top: 0;">User Profile</h2>
        <p id="p-gender" style="color: #666; font-weight: bold;"></p>
        <hr>
        <div style="text-align: left; max-height: 120px; overflow-y: auto;">
            <strong>Friends:</strong><div id="p-friends" style="font-size: 13px;"></div>
        </div>
        <hr>
        <div style="display: flex; gap: 5px; justify-content: center;">
            <button class="btn" id="addFriendBtn">Add Friend</button>
            <button class="btn btn-danger" id="reportBtn">Report</button>
        </div>
        <br>
        <button class="btn" onclick="document.getElementById('profile-overlay').style.display='none'">Close</button>
    </div>
</div>

<div class="main-wrapper">
    <div id="logged-out-view" class="hidden">
        <div class="auth-card">
            <h2 style="margin-top:0;">Join the Community</h2>
            <input type="text" id="reg-username" placeholder="Choose Username">
            <input type="email" id="auth-email" placeholder="Email Address">
            <input type="password" id="auth-password" placeholder="Password">
            <select id="reg-gender"><option value="Boy">Boy</option><option value="Girl">Girl</option></select>
            <div style="margin-top:20px;">
                <button class="btn" id="loginBtn">Login</button>
                <button class="btn" style="background:#0055ff; color:white; border:none;" id="signupBtn">Create Account</button>
            </div>
        </div>
    </div>

    <div id="logged-in-view" class="hidden">
        <div style="background: #f4f4f4; padding: 12px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center;">
            <span id="welcome-text" style="font-weight: bold;">Loading...</span>
            <div>
                <button class="btn btn-admin hidden" id="adminBtn">Admin Tools</button>
                <button class="btn" id="logoutBtn">Logout</button>
            </div>
        </div>

        <div id="admin-panel" class="hidden" style="border: 3px solid #ffcc00; padding: 20px; margin: 15px; background: #fffdf0; border-radius: 8px;">
            <h3 style="margin-top:0; color:#e67e22;">Administrator Console</h3>
            <div style="display:flex; gap:10px;">
                <input type="text" id="admin-msg-input" placeholder="Enter Global Announcement..." style="flex:1;">
                <button class="btn btn-admin" id="updateAnnouncement">Update Banner</button>
            </div>
            <hr>
            <div style="display: flex; gap: 20px;">
                <div style="flex:1;">
                    <strong>Active Reports:</strong>
                    <div id="report-list" style="font-size: 12px; background:white; padding:10px; border:1px solid #ccc; margin-top:5px; height:150px; overflow-y:auto;"></div>
                </div>
                <div style="flex:1;">
                    <strong>Ban Management:</strong><br>
                    <input type="text" id="ban-uid" placeholder="Target User ID" style="width:90%;">
                    <input type="text" id="ban-reason-input" placeholder="Ban Reason..." style="width:90%;">
                    <input type="number" id="ban-days" placeholder="Days (0 = Permanent)" style="width:90%;">
                    <button class="btn btn-danger" id="applyBan" style="width:96%; margin-top:10px;">Execute Ban</button>
                </div>
            </div>
        </div>

        <div style="padding: 20px;">
            <div class="forum-header">Share your thoughts</div>
            <div style="padding: 15px; border: 1px solid #ccc; border-top: none; background:#fff;">
                <textarea id="post-input" placeholder="What are you thinking about?" style="height: 80px;"></textarea>
                <button class="btn" id="submitPost" style="margin-top:10px; background: #0055ff; color: white; border: none; width: 100%; font-size: 14px;">Post Message</button>
            </div>
            <div id="thread-display" style="margin-top:10px;"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, push, onValue, get, child, remove, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyANfmR8j_Z7mHmSO1GNXGnIGKTdBiU6uiU",
        authDomain: "testingforum-669a9.firebaseapp.com",
        databaseURL: "https://testingforum-669a9-default-rtdb.firebaseio.com",
        projectId: "testingforum-669a9",
        storageBucket: "testingforum-669a9.firebasestorage.app",
        messagingSenderId: "685025117821",
        appId: "1:685025117821:web:c3340c8d5475e33eded314"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const ADMIN_EMAIL = "fahid.001x@gmail.com"; 
    let currentUsername = "";
    let viewingUid = "";

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const banSnap = await get(child(ref(db), `bans/${user.uid}`));
            if(banSnap.exists()){
                const b = banSnap.val();
                if(b.expiry === 0 || b.expiry > Date.now()){
                    document.getElementById('ban-view').classList.remove('hidden');
                    document.getElementById('ban-reason').innerText = "REASON: " + b.reason;
                    document.getElementById('ban-expiry').innerText = b.expiry === 0 ? "STATUS: PERMANENT" : "EXPIRES: " + new Date(b.expiry).toLocaleString();
                    return;
                }
            }

            const snap = await get(child(ref(db), `users/${user.uid}`));
            currentUsername = snap.exists() ? snap.val().username : user.email;
            document.getElementById('welcome-text').innerText = "Logged in as: " + currentUsername;
            document.getElementById('user-display').innerText = user.email;
            document.getElementById('logged-in-view').classList.remove('hidden');
            document.getElementById('logged-out-view').classList.add('hidden');

            const isAdmin = user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase();
            if(isAdmin) {
                document.getElementById('adminBtn').classList.remove('hidden');
                loadReports();
            }
            loadThreads(isAdmin);
        } else {
            document.getElementById('logged-out-view').classList.remove('hidden');
            document.getElementById('logged-in-view').classList.add('hidden');
        }
    });

    document.getElementById('signupBtn').onclick = async () => {
        const u = document.getElementById('reg-username').value.trim();
        const e = document.getElementById('auth-email').value.trim();
        const p = document.getElementById('auth-password').value;
        const g = document.getElementById('reg-gender').value;

        if(!u || !e || !p) return alert("All fields are required!");

        try {
            const userQuery = query(ref(db, 'users'), orderByChild('username'), equalTo(u));
            const snapshot = await get(userQuery);

            if (snapshot.exists()) {
                alert("This username is taken! Please choose another one.");
                return;
            }

            const res = await createUserWithEmailAndPassword(auth, e, p);
            await set(ref(db, 'users/' + res.user.uid), { username: u, gender: g, email: e });
            location.reload();
        } catch(err) { alert(err.message); }
    };

    function loadReports() {
        onValue(ref(db, 'reports'), (s) => {
            const list = document.getElementById('report-list');
            list.innerHTML = "";
            s.forEach(c => {
                const r = c.val();
                list.innerHTML += `<div style="border-bottom:1px solid #eee; padding:5px;">⚠️ ${r.reason}<br><small>UID: ${r.reported}</small> <button class="btn" style="padding:2px 5px; font-size:10px;" onclick="document.getElementById('ban-uid').value='${r.reported}'">Select</button></div>`;
            });
        });
    }

    document.getElementById('applyBan').onclick = () => {
        const uid = document.getElementById('ban-uid').value;
        const reason = document.getElementById('ban-reason-input').value;
        const days = parseInt(document.getElementById('ban-days').value);
        if(!uid || !reason) return alert("Enter UID and Reason");
        const expiry = days === 0 ? 0 : Date.now() + (days * 24 * 60 * 60 * 1000);
        set(ref(db, `bans/${uid}`), { reason, expiry });
        alert("Ban Applied Successfully.");
    };

    window.openProfile = async (uid) => {
        viewingUid = uid;
        const snap = await get(child(ref(db), `users/${uid}`));
        if(snap.exists()) {
            document.getElementById('p-name').innerText = snap.val().username;
            document.getElementById('p-gender').innerText = "Gender: " + snap.val().gender;
            document.getElementById('profile-overlay').style.display = 'flex';
            onValue(ref(db, `friends/${uid}`), (s) => {
                const list = document.getElementById('p-friends');
                list.innerHTML = s.exists() ? "" : "No friends yet.";
                s.forEach(f => { list.innerHTML += `<div>⭐ ${f.val().name}</div>`; });
            });
        }
    };

    document.getElementById('addFriendBtn').onclick = () => set(ref(db, `friends/${auth.currentUser.uid}/${viewingUid}`), { name: document.getElementById('p-name').innerText });
    
    document.getElementById('reportBtn').onclick = () => {
        const r = prompt("Why are you reporting this user?");
        if(r) {
            push(ref(db, 'reports'), { reported: viewingUid, reason: r, by: auth.currentUser.uid });
            alert("Report sent to Admin.");
        }
    };

    function loadThreads(isAdmin) {
        onValue(ref(db, 'threads'), (s) => {
            const d = document.getElementById('thread-display'); d.innerHTML = "";
            s.forEach(c => {
                const p = c.val();
                const del = (p.uid === auth.currentUser.uid || isAdmin) ? `<button class="btn btn-danger" style="padding:2px 8px;" onclick="remove(ref(db,'threads/${c.key}'))">Delete</button>` : "";
                d.insertAdjacentHTML('afterbegin', `<div class="thread-row"><div><span class="clickable-name" onclick="openProfile('${p.uid}')">${p.author}</span><br><span style="font-size:15px;">${p.message}</span></div>${del}</div>`);
            });
        });
    }

    document.getElementById('submitPost').onclick = () => {
        const msg = document.getElementById('post-input').value;
        if(msg) push(ref(db, 'threads'), { message: msg, author: currentUsername, uid: auth.currentUser.uid, time: Date.now() });
        document.getElementById('post-input').value = "";
    };

    document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-password').value);
    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());
    document.getElementById('adminBtn').onclick = () => document.getElementById('admin-panel').classList.toggle('hidden');
    document.getElementById('updateAnnouncement').onclick = () => set(ref(db, 'site_settings/announcement'), document.getElementById('admin-msg-input').value);
    
    onValue(ref(db, 'site_settings/announcement'), (s) => {
        const b = document.getElementById('announcement-banner');
        if(s.exists() && s.val() !== "") { b.innerText = s.val(); b.style.display = "block"; } else { b.style.display = "none"; }
    });
</script>
</body>
</html>
