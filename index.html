<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Robloxians Forum - RETRO</title>
    <style>
        /* RETRO THEME OVERHAUL */
        body { 
            font-family: "MS Sans Serif", Geneva, sans-serif; 
            margin: 0; 
            background-color: #008080; /* Classic Win95 Teal */
            background-image: none; /* Removed image for pure retro look */
        }
        
        header { 
            background: #000080; /* Navy Blue Title Bar */
            color: white; 
            padding: 5px 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #fff;
        }

        .main-wrapper { 
            width: 850px; 
            margin: 30px auto; 
            background: #c0c0c0; /* Classic Gray */
            border: 3px solid;
            border-color: #fff #808080 #808080 #fff; /* Beveled edge */
            min-height: 700px;
            padding: 10px;
        }

        .forum-header { 
            background: #000080; 
            color: white; 
            padding: 4px; 
            font-size: 14px; 
            border: 1px solid #fff;
            margin-bottom: 10px;
        }

        /* 3D BEVELED BUTTONS */
        .btn, .btn-admin, .btn-danger { 
            background: #c0c0c0; 
            border: 2px solid;
            border-color: #fff #404040 #404040 #fff; 
            padding: 4px 10px; 
            cursor: pointer; 
            font-family: "MS Sans Serif", sans-serif;
            font-size: 12px;
            font-weight: bold;
        }
        .btn:active { border-color: #404040 #fff #fff #404040; }
        
        .btn-admin { color: #800000; } /* Dark Red for Admin */
        .btn-danger { color: #000; }

        input, textarea { 
            background: #fff; 
            border: 2px solid; 
            border-color: #404040 #fff #fff #404040; 
            padding: 4px;
        }

        .thread-row { 
            border-bottom: 1px solid #808080; 
            padding: 10px; 
            background: #fff; 
            font-size: 13px;
            margin-bottom: 2px;
        }

        .clickable-name { 
            text-decoration: underline; 
            font-weight: bold; 
            cursor: pointer;
        }

        #admin-panel { 
            border: 2px solid #808080; 
            padding: 10px; 
            margin-bottom: 20px; 
            background: #e1e1e1;
        }

        .hidden { display: none !important; }
        
        #announcement-container { 
            background: #ffff00; 
            border: 2px solid #000; 
            color: #000; 
            padding: 5px; 
            font-weight: bold; 
            text-align: center;
        }
    </style>
</head>
<body>

<div id="announcement-container" class="hidden"><div id="announcement-display"></div></div>

<header>
    <div style="font-weight:bold;">[ The Robloxians ]</div>
    <div id="user-display" style="font-size: 12px;">Guest</div>
</header>

<div class="main-wrapper">
    <div id="logged-out-view" class="hidden">
        <center>
            <div style="width: 300px; border: 2px solid #808080; padding: 20px; background: #c0c0c0;">
                <h3 style="margin-top:0;">User Login</h3>
                <input type="text" id="reg-username" placeholder="Username"><br>
                <input type="email" id="auth-email" placeholder="Email"><br>
                <input type="password" id="auth-password" placeholder="Password"><br><br>
                <button class="btn" id="loginBtn">OK</button>
                <button class="btn" id="signupBtn">Sign Up</button>
            </div>
        </center>
    </div>

    <div id="logged-in-view" class="hidden">
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <span id="welcome-text" style="font-weight: bold;"></span>
            <div>
                <button class="btn btn-admin hidden" id="adminBtn">System Settings</button>
                <button class="btn btn-danger" id="logoutBtn">Exit</button>
            </div>
        </div>

        <div id="admin-panel" class="hidden">
            <div class="forum-header">Root Controls</div>
            <input type="text" id="announce-text" placeholder="Global Notice">
            <button class="btn" id="postAnnounce">Broadcast</button>
            <hr>
            <input type="text" id="target-uid" placeholder="Target UID">
            <button class="btn" id="applyBan">Ban</button>
            <button class="btn" id="applyAdmin">Promote</button>
            <hr>
            <strong>Shadow Logs:</strong>
            <div id="admin-logs" style="height: 100px; overflow-y: auto; background: #000; color: #0f0; font-family: monospace; padding: 5px; font-size: 10px;"></div>
        </div>

        <div class="forum-header">Community Message Board</div>
        <textarea id="post-input" rows="3" placeholder="Write message here..."></textarea><br>
        <button class="btn" id="submitPost">Post Message</button>
        
        <div id="thread-display" style="margin-top: 20px; border: 1px solid #808080;"></div>
    </div>
</div>

<div id="profile-overlay">
    <div class="profile-card" style="background: #c0c0c0; border: 3px solid; border-color: #fff #808080 #808080 #fff; padding: 20px;">
        <h2 id="p-name" style="margin-top:0;">Profile</h2>
        <div id="p-bio" class="bio-box" style="background:#fff; border:2px inset #808080; min-height:50px; padding:5px;"></div>
        <div id="decoration-options" class="hidden">
            <hr>
            <label style="font-size: 11px;">Name Color:</label>
            <input type="color" id="theme-picker">
            <button class="btn" id="save-theme-btn">Apply</button>
        </div>
        <button id="edit-bio-btn" class="btn hidden">Edit Bio</button>
        <div id="p-uid-display" style="font-size: 9px; margin-top: 10px;"></div>
        <hr>
        <button class="btn" onclick="document.getElementById('profile-overlay').style.display='none'">Close</button>
    </div>
</div>

<script type="module">
    // ALL FIREBASE LOGIC AND CHAT FIXES FROM THE PREVIOUS STABLE BUILD ARE COPIED HERE
    // NO CHANGES WERE MADE TO THE LOADTHREADS OR SUBMITPOST FUNCTIONS
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, push, onValue, get, child, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyANfmR8j_Z7mHmSO1GNXGnIGKTdBiU6uiU",
        authDomain: "testingforum-669a9.firebaseapp.com",
        databaseURL: "https://testingforum-669a9-default-rtdb.firebaseio.com",
        projectId: "testingforum-669a9",
        storageBucket: "testingforum-669a9.firebasestorage.app",
        messagingSenderId: "685025117821",
        appId: "1:685025117821:web:c3340c8d5475e33eded314"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const OWNER_EMAIL = "fahid.001x@gmail.com";
    let isStaff = false;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const snap = await get(child(ref(db), `users/${user.uid}`));
            const userData = snap.val();
            document.getElementById('logged-in-view').classList.remove('hidden');
            document.getElementById('logged-out-view').classList.add('hidden');
            document.getElementById('welcome-text').innerText = "Logged in: " + (userData ? userData.username : "User");
            
            if(user.email.toLowerCase() === OWNER_EMAIL || (userData && userData.rank === "admin")) {
                isStaff = true;
                document.getElementById('adminBtn').classList.remove('hidden');
                loadLogs();
            }
            loadThreads();
        } else {
            document.getElementById('logged-out-view').classList.remove('hidden');
            document.getElementById('logged-in-view').classList.add('hidden');
        }
    });

    // CHAT LOGIC (STABLE - NO PUSHING)
    async function loadThreads() {
        onValue(ref(db, 'threads'), async (snapshot) => {
            const displayArea = document.getElementById('thread-display');
            displayArea.innerHTML = ""; 
            const usersSnap = await get(child(ref(db), 'users'));
            const allUsers = usersSnap.val() || {};
            let threads = [];
            snapshot.forEach(c => { threads.push({ id: c.key, ...c.val() }); });
            threads.reverse().forEach(post => {
                const uD = allUsers[post.uid] || {};
                let displayColor = "#0055ff";
                if(uD.themeColor) displayColor = uD.themeColor;
                else if(uD.email && uD.email.toLowerCase() === OWNER_EMAIL) displayColor = "#FF0000";

                const row = document.createElement('div');
                row.className = 'thread-row';
                row.innerHTML = `
                    <div><span class="clickable-name" style="color:${displayColor}" onclick="openProfile('${post.uid}')">${post.author}</span>: ${post.message}</div>
                    ${isStaff ? `<button class="btn" style="padding:0 5px; font-size:9px;" onclick="deletePost('${post.id}', '${post.author}', \`${post.message}\`)">DEL</button>` : ""}
                `;
                displayArea.appendChild(row);
            });
        });
    }

    // LOGS & DELETE
    function loadLogs() {
        onValue(ref(db, 'admin_logs'), (s) => {
            const logBox = document.getElementById('admin-logs'); 
            logBox.innerHTML = "";
            s.forEach(c => {
                const item = document.createElement('div');
                item.innerText = `[${c.val().time}] ${c.val().msg}`;
                logBox.prepend(item);
            });
        });
    }

    window.deletePost = (pid, author, msg) => {
        if(confirm("Delete post?")) {
            push(ref(db, 'admin_logs'), { time: new Date().toLocaleTimeString(), msg: `DELETED ${author}: "${msg}"` });
            remove(ref(db, `threads/${pid}`));
        }
    };

    // Keep rest of the functions (login/signup/profile) exactly the same...
    document.getElementById('submitPost').onclick = async () => {
        const m = document.getElementById('post-input').value;
        if(!m) return;
        const uSnap = await get(child(ref(db), `users/${auth.currentUser.uid}`));
        push(ref(db, 'threads'), { message: m, author: uSnap.val().username, uid: auth.currentUser.uid });
        document.getElementById('post-input').value = "";
    };

    document.getElementById('adminBtn').onclick = () => document.getElementById('admin-panel').classList.toggle('hidden');
    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());
    document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-password').value);
    document.getElementById('signupBtn').onclick = async () => {
        const res = await createUserWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-password').value);
        await set(ref(db, 'users/' + res.user.uid), { username: document.getElementById('reg-username').value, email: document.getElementById('auth-email').value, rank: "member", bio: "" });
        location.reload();
    };
</script>
</body>
</html>
