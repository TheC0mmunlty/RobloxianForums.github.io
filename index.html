<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Robloxians - 2012 Legacy</title>
    <style>
        /* GUI SCALE: SMALLER & CLASSIC FONT */
        body { 
            font-family: "MS Sans Serif", Geneva, sans-serif; 
            margin: 0; 
            background-image: url('https://wallpapercave.com/wp/wp9084955.jpg'); 
            background-attachment: fixed; 
            background-size: cover; 
        }
        
        header { 
            background: #0055ff; 
            color: white; 
            padding: 4px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 3px solid #0033aa;
        }

        /* BANNER: NO EMOJI, FIXED POSITION */
        #announcement-container { 
            background: #ff9800; 
            border-bottom: 2px solid #cc7a00; 
            color: #fff; 
            padding: 6px; 
            font-weight: bold; 
            text-align: center;
            display: none;
            font-size: 12px;
        }

        .main-wrapper { 
            width: 800px; /* Smaller GUI */
            margin: 10px auto; 
            background: rgba(238, 238, 238, 0.95); 
            border: 1px solid #888; 
            min-height: 600px;
            padding: 15px;
        }

        .forum-header { 
            background: #ddd; 
            color: #333; 
            padding: 5px; 
            font-weight: bold;
            border: 1px solid #bbb;
            font-size: 12px;
        }

        textarea#post-input { 
            width: 98%; 
            height: 80px; 
            border: 1px solid #ccc; 
            padding: 5px;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .btn { 
            background: #e1e1e1; 
            border: 1px solid #777; 
            padding: 3px 10px; 
            cursor: pointer; 
            font-size: 11px;
            font-family: "MS Sans Serif", sans-serif;
        }
        
        .btn-submit { background: #ffcc00; border-color: #ccaa00; font-weight: bold; }

        .thread-row { 
            border-bottom: 1px solid #ddd; 
            padding: 8px; 
            background: #fff; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        .clickable-name { font-weight: bold; cursor: pointer; color: #0055ff; }

        #admin-panel { border: 2px solid #0055ff; padding: 10px; margin-bottom: 10px; background: #fff; font-size: 11px; }
        .hidden { display: none !important; }

        #profile-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); display: none; 
            z-index: 1000; justify-content: center; align-items: center; 
        }
        .profile-card { background: #fff; border: 4px solid #0055ff; padding: 20px; width: 350px; text-align: center; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold;">ROBLOX - The Robloxians</div>
    <div id="user-display" style="font-size: 11px;">Guest</div>
</header>

<div id="announcement-container">
    <span id="announcement-display"></span>
</div>

<div class="main-wrapper">
    <div id="logged-in-view" class="hidden">
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <span id="welcome-text" style="font-weight: bold; font-size: 12px;"></span>
            <div>
                <button class="btn hidden" id="adminBtn">System Settings</button>
                <button class="btn" id="logoutBtn" style="background:#ff4444; color:white;">Exit</button>
            </div>
        </div>

        <div id="admin-panel" class="hidden">
            <strong>Command Center</strong><br>
            <input type="text" id="announce-text" placeholder="Banner text..." style="width:50%;">
            <button class="btn btn-submit" id="postAnnounce">Update Banner</button>
            <hr>
            ID: <input type="text" id="target-uid" style="width:120px;">
            <button class="btn" id="applyAdmin">Promote</button>
            <button class="btn" id="removeAdmin">Unrank</button>
            <br><br>
            Ban: <input type="number" id="ban-days" placeholder="Days (0 for Perm)" style="width:80px;">
            <button class="btn" id="applyBan" style="color:red;">Ban User</button>
            <button class="btn" id="applyUnban">Unban</button>
            <hr>
            <div id="admin-logs" style="height: 60px; overflow-y: auto; background: #000; color: #0f0; padding: 5px; font-family: monospace; font-size: 10px;"></div>
        </div>

        <div class="forum-header">Community Feed</div>
        <textarea id="post-input" placeholder="Post a message..."></textarea><br>
        <button class="btn btn-submit" id="submitPost">Submit Post</button>
        
        <div id="thread-display" style="margin-top: 10px;"></div>
    </div>
</div>

<div id="profile-overlay">
    <div class="profile-card">
        <h2 id="p-name" style="margin:0;"></h2>
        <div id="p-bio" style="background:#f0f0f0; padding:10px; min-height:60px; text-align:left; font-size:12px; margin-top:5px;"></div>
        <div id="p-uid-display" style="font-size: 10px; color: #666; margin-top: 5px;"></div>
        <div id="decoration-options" class="hidden">
            <hr>
            Rank Color: <input type="color" id="theme-picker">
            <button class="btn" id="save-theme-btn">Save</button>
        </div>
        <br>
        <button class="btn" onclick="document.getElementById('profile-overlay').style.display='none'">Close</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, push, onValue, get, child, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyANfmR8j_Z7mHmSO1GNXGnIGKTdBiU6uiU",
        authDomain: "testingforum-669a9.firebaseapp.com",
        databaseURL: "https://testingforum-669a9-default-rtdb.firebaseio.com",
        projectId: "testingforum-669a9",
        storageBucket: "testingforum-669a9.firebasestorage.app",
        messagingSenderId: "685025117821",
        appId: "1:685025117821:web:c3340c8d5475e33eded314"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const OWNER_EMAIL = "fahid.001x@gmail.com";
    let isStaff = false;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const snap = await get(child(ref(db), `users/${user.uid}`));
            const uD = snap.val();

            // CHECK BAN STATUS
            if(uD && uD.banned) {
                const now = Date.now();
                if(uD.banUntil === 0 || now < uD.banUntil) {
                    alert("Account Suspended. Type: " + (uD.banUntil === 0 ? "Permanent" : "Temporary"));
                    signOut(auth).then(() => location.reload());
                    return;
                }
            }

            document.getElementById('logged-in-view').classList.remove('hidden');
            document.getElementById('welcome-text').innerText = "Hello, " + (uD ? uD.username : "User");
            
            if(user.email.toLowerCase() === OWNER_EMAIL || (uD && uD.rank === "admin")) {
                isStaff = true;
                document.getElementById('adminBtn').classList.remove('hidden');
                loadLogs();
            }

            onValue(ref(db, 'announcement'), (s) => {
                const display = document.getElementById('announcement-display');
                if(s.exists() && s.val().text) {
                    display.innerText = s.val().text;
                    document.getElementById('announcement-container').style.display = 'block';
                } else {
                    document.getElementById('announcement-container').style.display = 'none';
                }
            });
            loadThreads();
        } else {
            // Re-use your previous login HTML/JS here
            document.getElementById('logged-in-view').innerHTML = "Please refresh to login.";
        }
    });

    async function loadThreads() {
        onValue(ref(db, 'threads'), async (snapshot) => {
            const displayArea = document.getElementById('thread-display');
            displayArea.innerHTML = ""; 
            const usersSnap = await get(child(ref(db), 'users'));
            const allUsers = usersSnap.val() || {};
            
            let threads = [];
            snapshot.forEach(c => { threads.push({ id: c.key, ...c.val() }); });
            threads.reverse().forEach(post => {
                const uD = allUsers[post.uid] || {};
                let color = uD.themeColor || (uD.email === OWNER_EMAIL ? "#FF0000" : "#0055ff");

                const row = document.createElement('div');
                row.className = 'thread-row';
                row.innerHTML = `
                    <div><span class="clickable-name" style="color:${color}" data-uid="${post.uid}">${post.author}</span>: ${post.message}</div>
                    ${isStaff ? `<button class="btn" style="background:#ff4444; color:white; border:none;" onclick="deletePost('${post.id}', '${post.author}', \`${post.message}\`)">DEL</button>` : ""}
                `;
                displayArea.appendChild(row);
            });

            document.querySelectorAll('.clickable-name').forEach(el => {
                el.onclick = () => openProfile(el.getAttribute('data-uid'));
            });
        });
    }

    // MODERATION: FIXED LOGGING & UNRANK/UNBAN
    window.deletePost = (pid, author, msg) => {
        if(confirm("Confirm deletion?")) {
            // FIXED: Now logs exactly what was deleted
            push(ref(db, 'admin_logs'), { 
                time: new Date().toLocaleTimeString(), 
                msg: `ERASED (${author}): "${msg}"` 
            });
            remove(ref(db, `threads/${pid}`));
        }
    };

    document.getElementById('applyBan').onclick = () => {
        const uid = document.getElementById('target-uid').value;
        const days = parseInt(document.getElementById('ban-days').value) || 0;
        const expiry = days === 0 ? 0 : Date.now() + (days * 24 * 60 * 60 * 1000);
        update(ref(db, `users/${uid}`), { banned: true, banUntil: expiry });
        alert("Action processed.");
    };

    document.getElementById('applyUnban').onclick = () => {
        const uid = document.getElementById('target-uid').value;
        update(ref(db, `users/${uid}`), { banned: false, banUntil: 0 });
        alert("Restriction lifted.");
    };

    document.getElementById('removeAdmin').onclick = () => {
        const uid = document.getElementById('target-uid').value;
        update(ref(db, `users/${uid}`), { rank: "member" });
        alert("Rank removed.");
    };

    // Rest of your Logic (SubmitPost, openProfile, etc) remains the same.
    document.getElementById('submitPost').onclick = async () => {
        const m = document.getElementById('post-input').value;
        if(!m) return;
        const uSnap = await get(child(ref(db), `users/${auth.currentUser.uid}`));
        push(ref(db, 'threads'), { message: m, author: uSnap.val().username, uid: auth.currentUser.uid });
        document.getElementById('post-input').value = "";
    };
    document.getElementById('adminBtn').onclick = () => document.getElementById('admin-panel').classList.toggle('hidden');
    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());
</script>
</body>
</html>
