<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Robloxians - 2012 Edition</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            /* RE-ADDED THE IMAGE BACKGROUND */
            background-image: url('https://wallpapercave.com/wp/wp9084955.jpg'); 
            background-attachment: fixed; 
            background-size: cover; 
            background-position: center; 
        }
        
        header { 
            background: #0055ff; /* Classic 2012 Roblox Blue */
            color: white; 
            padding: 10px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 4px solid #0033aa;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* FIXED ORANGE BANNER POSITION */
        #announcement-container { 
            background: #ff9800; 
            border-bottom: 2px solid #cc7a00; 
            color: #fff; 
            padding: 10px; 
            font-weight: bold; 
            text-align: center;
            display: none;
            font-size: 14px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .main-wrapper { 
            width: 900px; 
            margin: 20px auto; 
            background: rgba(238, 238, 238, 0.95); /* Slight transparency to see grass */
            border: 1px solid #888; 
            min-height: 800px;
            padding: 20px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.3);
        }

        .forum-header { 
            background: #ddd; 
            color: #333; 
            padding: 8px; 
            font-weight: bold;
            border: 1px solid #bbb;
            margin-bottom: 10px;
        }

        /* WIDE CHAT BOX */
        textarea#post-input { 
            width: 100%; 
            box-sizing: border-box; /* Makes it stay inside the wrapper */
            height: 120px; 
            border: 1px solid #ccc; 
            padding: 10px;
            font-size: 14px;
            margin-bottom: 10px;
            resize: vertical;
        }

        .btn { 
            background: #e1e1e1; 
            border: 1px solid #777; 
            padding: 7px 20px; 
            cursor: pointer; 
            font-weight: bold;
            border-radius: 3px;
        }
        .btn:hover { background: #f0f0f0; }
        
        .btn-submit { background: #ffcc00; border-color: #ccaa00; }

        .thread-row { 
            border-bottom: 1px solid #ccc; 
            padding: 12px; 
            background: #fff; 
            margin-bottom: 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clickable-name { 
            text-decoration: none; 
            font-weight: bold; 
            cursor: pointer;
            color: #0055ff;
        }
        .clickable-name:hover { text-decoration: underline; }

        #profile-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); display: none; 
            z-index: 1000; justify-content: center; align-items: center; 
        }
        
        .profile-card { 
            background: #fff; border: 5px solid #0055ff; 
            padding: 30px; width: 450px; text-align: center; border-radius: 10px;
        }

        .hidden { display: none !important; }
        #admin-panel { border: 2px dashed #ff9800; padding: 15px; margin-bottom: 20px; background: #fffdf0; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold; font-size: 20px;">ROBLOX - The Robloxians</div>
    <div id="user-display" style="font-size: 12px;">Guest</div>
</header>

<div id="announcement-container">
    <span id="announcement-display"></span>
</div>

<div class="main-wrapper">
    <div id="logged-out-view" class="hidden">
        <center>
            <div style="width: 350px; background: white; padding: 30px; border: 1px solid #ccc;">
                <h2>Login to Roblox</h2>
                <input type="text" id="reg-username" placeholder="Username" style="width:90%; padding:8px; margin:5px;"><br>
                <input type="email" id="auth-email" placeholder="Email" style="width:90%; padding:8px; margin:5px;"><br>
                <input type="password" id="auth-password" placeholder="Password" style="width:90%; padding:8px; margin:5px;"><br><br>
                <button class="btn btn-submit" id="loginBtn">Login</button>
                <button class="btn" id="signupBtn">Sign Up</button>
            </div>
        </center>
    </div>

    <div id="logged-in-view" class="hidden">
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
            <span id="welcome-text" style="font-weight: bold;"></span>
            <div>
                <button class="btn hidden" id="adminBtn">Settings</button>
                <button class="btn" id="logoutBtn" style="background:#ff4444; color:white; border:none;">Logout</button>
            </div>
        </div>

        <div id="admin-panel" class="hidden">
            <strong>Admin Dashboard</strong><br>
            <input type="text" id="announce-text" placeholder="Banner Message" style="width:60%; padding:5px;">
            <button class="btn btn-submit" id="postAnnounce">Update Banner</button>
            <hr>
            <input type="text" id="target-uid" placeholder="UID" style="width:30%; padding:5px;">
            <button class="btn" id="applyBan">Ban</button>
            <button class="btn btn-submit" id="applyAdmin">Make Admin</button>
            <div id="admin-logs" style="height: 100px; overflow-y: auto; background: #000; color: #0f0; padding: 5px; margin-top: 10px; font-family: monospace; font-size: 11px;"></div>
        </div>

        <div class="forum-header">Community Feed</div>
        <textarea id="post-input" placeholder="What's on your mind?"></textarea><br>
        <button class="btn btn-submit" id="submitPost">Submit Post</button>
        
        <div id="thread-display" style="margin-top: 20px;"></div>
    </div>
</div>

<div id="profile-overlay">
    <div class="profile-card">
        <h1 id="p-name"></h1>
        <div id="p-bio" style="background:#f9f9f9; border:1px solid #ccc; padding:15px; text-align:left; min-height:100px;"></div>
        <div id="p-uid-display" style="font-size: 11px; color: #777; margin: 15px 0;"></div>
        <div id="decoration-options" class="hidden">
            <hr>
            <label>Name Color:</label>
            <input type="color" id="theme-picker">
            <button class="btn" id="save-theme-btn">Save</button>
        </div>
        <br>
        <button class="btn" onclick="document.getElementById('profile-overlay').style.display='none'">Close</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, push, onValue, get, child, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyANfmR8j_Z7mHmSO1GNXGnIGKTdBiU6uiU",
        authDomain: "testingforum-669a9.firebaseapp.com",
        databaseURL: "https://testingforum-669a9-default-rtdb.firebaseio.com",
        projectId: "testingforum-669a9",
        storageBucket: "testingforum-669a9.firebasestorage.app",
        messagingSenderId: "685025117821",
        appId: "1:685025117821:web:c3340c8d5475e33eded314"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const OWNER_EMAIL = "fahid.001x@gmail.com";
    let isStaff = false;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const snap = await get(child(ref(db), `users/${user.uid}`));
            const uD = snap.val();
            document.getElementById('logged-in-view').classList.remove('hidden');
            document.getElementById('logged-out-view').classList.add('hidden');
            document.getElementById('welcome-text').innerText = "Hello, " + (uD ? uD.username : "User") + "!";
            
            if(user.email.toLowerCase() === OWNER_EMAIL || (uD && uD.rank === "admin")) {
                isStaff = true;
                document.getElementById('adminBtn').classList.remove('hidden');
                loadLogs();
            }

            onValue(ref(db, 'announcement'), (s) => {
                const display = document.getElementById('announcement-display');
                if(s.exists() && s.val().text) {
                    display.innerText = "📢 " + s.val().text;
                    document.getElementById('announcement-container').style.display = 'block';
                } else {
                    document.getElementById('announcement-container').style.display = 'none';
                }
            });
            loadThreads();
        } else {
            document.getElementById('logged-out-view').classList.remove('hidden');
            document.getElementById('logged-in-view').classList.add('hidden');
        }
    });

    async function loadThreads() {
        onValue(ref(db, 'threads'), async (snapshot) => {
            const displayArea = document.getElementById('thread-display');
            displayArea.innerHTML = ""; 
            const usersSnap = await get(child(ref(db), 'users'));
            const allUsers = usersSnap.val() || {};
            
            let threads = [];
            snapshot.forEach(c => { threads.push({ id: c.key, ...c.val() }); });
            threads.reverse().forEach(post => {
                const uD = allUsers[post.uid] || {};
                let color = uD.themeColor || (uD.email === OWNER_EMAIL ? "#FF0000" : "#0055ff");

                const row = document.createElement('div');
                row.className = 'thread-row';
                row.innerHTML = `
                    <div><span class="clickable-name" style="color:${color}" data-uid="${post.uid}">${post.author}</span>: ${post.message}</div>
                    ${isStaff ? `<button class="btn" style="padding:2px 5px; font-size:10px; background:#ff4444; color:white; border:none;" onclick="deletePost('${post.id}', '${post.author}', \`${post.message}\`)">DEL</button>` : ""}
                `;
                displayArea.appendChild(row);
            });

            // FIXED PROFILE CLICK EVENT
            document.querySelectorAll('.clickable-name').forEach(el => {
                el.onclick = () => openProfile(el.getAttribute('data-uid'));
            });
        });
    }

    window.openProfile = async (uid) => {
        const snap = await get(child(ref(db), `users/${uid}`));
        if(snap.exists()) {
            const d = snap.val();
            document.getElementById('p-name').innerText = d.username;
            document.getElementById('p-bio').innerText = d.bio || "This user hasn't set a bio yet.";
            document.getElementById('p-uid-display').innerText = "User ID: " + uid;
            document.getElementById('profile-overlay').style.display = 'flex';
            
            if(isStaff) document.getElementById('target-uid').value = uid;
            if(uid === auth.currentUser.uid) {
                document.getElementById('decoration-options').classList.remove('hidden');
                document.getElementById('save-theme-btn').onclick = () => {
                    update(ref(db, `users/${uid}`), { themeColor: document.getElementById('theme-picker').value });
                    alert("Profile updated!");
                };
            } else {
                document.getElementById('decoration-options').classList.add('hidden');
            }
        }
    };

    function loadLogs() {
        onValue(ref(db, 'admin_logs'), (s) => {
            const logBox = document.getElementById('admin-logs'); 
            logBox.innerHTML = "";
            s.forEach(c => {
                const item = document.createElement('div');
                item.innerText = `[${c.val().time}] ${c.val().msg}`;
                logBox.prepend(item);
            });
        });
    }

    window.deletePost = (pid, author, msg) => {
        if(confirm("Are you sure you want to delete this?")) {
            push(ref(db, 'admin_logs'), { time: new Date().toLocaleTimeString(), msg: `MOD: Deleted post by ${author}` });
            remove(ref(db, `threads/${pid}`));
        }
    };

    document.getElementById('postAnnounce').onclick = () => set(ref(db, 'announcement'), { text: document.getElementById('announce-text').value });
    document.getElementById('submitPost').onclick = async () => {
        const m = document.getElementById('post-input').value;
        if(!m) return;
        const uSnap = await get(child(ref(db), `users/${auth.currentUser.uid}`));
        push(ref(db, 'threads'), { message: m, author: uSnap.val().username, uid: auth.currentUser.uid });
        document.getElementById('post-input').value = "";
    };

    document.getElementById('adminBtn').onclick = () => document.getElementById('admin-panel').classList.toggle('hidden');
    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());
    document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-password').value);
    document.getElementById('signupBtn').onclick = async () => {
        const res = await createUserWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-password').value);
        await set(ref(db, 'users/' + res.user.uid), { username: document.getElementById('reg-username').value, email: document.getElementById('auth-email').value, rank: "member", bio: "" });
        location.reload();
    };
</script>
</body>
</html>
